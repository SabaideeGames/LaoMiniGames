<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ຈື່ບັດ — Memory Cards</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
    :root{--bg:#0f0f1a;--bg-glass:rgba(255,255,255,0.08);--border-glass:rgba(255,255,255,0.12);--text:#f0f0f5;--text2:#a0a0b8;--accent-grad:linear-gradient(135deg,#7C3AED,#2563EB);--glow:rgba(124,58,237,0.3);--success:#10B981;--font:'Noto Sans Lao','Phetsarath OT',system-ui,sans-serif}
    body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;display:flex;flex-direction:column}
    .bg{position:fixed;inset:0;z-index:-1;pointer-events:none}
    .bg::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,0.08)0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(37,99,235,0.06)0%,transparent 50%)}

    .overlay{position:fixed;inset:0;z-index:100;background:rgba(15,15,26,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;opacity:1;transition:opacity 0.4s}
    .overlay.hidden{opacity:0;pointer-events:none}
    .ov-emoji{font-size:3.5rem;margin-bottom:12px;animation:bounceIn 0.5s ease}
    @keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
    .ov-title{font-size:2.2rem;font-weight:800;text-align:center;margin-bottom:6px}
    .ov-sub{font-size:0.95rem;color:var(--text2);text-align:center;margin-bottom:28px;max-width:300px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 36px;border:none;border-radius:999px;font-family:var(--font);font-size:1.1rem;font-weight:600;cursor:pointer;transition:all 0.25s;touch-action:manipulation;min-width:200px}
    .btn:active{transform:scale(0.96)}
    .btn-primary{background:var(--accent-grad);color:white;box-shadow:0 0 20px var(--glow)}
    .btn-secondary{background:var(--bg-glass);color:var(--text);border:1px solid var(--border-glass)}
    .btn-group{display:flex;flex-direction:column;gap:12px;width:100%;max-width:260px;align-items:center}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:300px;margin-bottom:24px}
    .stat-item{text-align:center;padding:12px 6px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:12px}
    .stat-value{font-size:1.5rem;font-weight:700}
    .stat-value.best{background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .stat-label{font-size:0.65rem;color:var(--text2);margin-top:4px}

    /* Level select */
    .level-select{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:24px}
    .level-btn{padding:10px 16px;border:2px solid var(--border-glass);border-radius:12px;background:var(--bg-glass);color:var(--text);font-family:var(--font);font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;touch-action:manipulation}
    .level-btn:active,.level-btn.active{border-color:#7C3AED;background:rgba(124,58,237,0.15)}
    .level-btn .stars{font-size:0.7rem;margin-top:4px;color:#F59E0B}

    /* Header */
    .game-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;z-index:10}
    @supports(padding:env(safe-area-inset-top)){.game-header{padding-top:calc(10px + env(safe-area-inset-top))}}
    .game-title{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px}
    .hdr-info{display:flex;gap:14px;align-items:center}
    .hdr-stat{text-align:center}
    .hdr-stat-lbl{font-size:0.55rem;color:var(--text2)}
    .hdr-stat-val{font-size:1rem;font-weight:700}

    /* Card grid */
    .cards-area{flex:1;display:flex;align-items:center;justify-content:center;padding:12px}
    .cards-grid{display:grid;gap:8px}
    .card{border-radius:10px;perspective:600px;cursor:pointer;touch-action:manipulation}
    .card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.4s ease}
    .card.flipped .card-inner{transform:rotateY(180deg)}
    .card.matched .card-inner{transform:rotateY(180deg)}
    .card.matched{opacity:0.6;pointer-events:none}
    .card-front,.card-back{position:absolute;inset:0;border-radius:10px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden}
    .card-front{background:linear-gradient(135deg,#4F46E5,#7C3AED);border:2px solid rgba(255,255,255,0.15);font-size:1.5rem}
    .card-back{background:var(--bg-glass);border:2px solid var(--border-glass);transform:rotateY(180deg);font-size:2rem}
    .card.matched .card-back{border-color:var(--success);background:rgba(16,185,129,0.1)}

    .sound-btn{position:fixed;top:12px;right:12px;z-index:200;width:40px;height:40px;padding:0;border-radius:50%;font-size:1.1rem;background:var(--bg-glass);color:var(--text);border:1px solid var(--border-glass);cursor:pointer;touch-action:manipulation}
    @supports(padding:env(safe-area-inset-top)){.sound-btn{top:calc(12px+env(safe-area-inset-top))}}
    .start-best{margin-top:16px;text-align:center}
    .star-rating{font-size:1.5rem;margin-bottom:12px;letter-spacing:4px}
  </style>
</head>
<body>
  <div class="bg"></div>

  <!-- START -->
  <div class="overlay" id="startScreen">
    <div class="ov-emoji">🃏</div>
    <div class="ov-title">ຈື່ບັດ</div>
    <div class="ov-sub">ພິກບັດ ແລະ ຈັບຄູ່ — ໃຊ້ຄວາມຊົງຈຳ!</div>
    <div style="font-size:0.85rem;color:var(--text2);margin-bottom:12px">ເລືອກດ່ານ:</div>
    <div class="level-select" id="levelSelect">
      <button class="level-btn active" data-level="0" onclick="selectLevel(0)">3×2<div class="stars" id="lvlStar0"></div></button>
      <button class="level-btn" data-level="1" onclick="selectLevel(1)">4×3<div class="stars" id="lvlStar1"></div></button>
      <button class="level-btn" data-level="2" onclick="selectLevel(2)">4×4<div class="stars" id="lvlStar2"></div></button>
      <button class="level-btn" data-level="3" onclick="selectLevel(3)">5×4<div class="stars" id="lvlStar3"></div></button>
      <button class="level-btn" data-level="4" onclick="selectLevel(4)">6×5<div class="stars" id="lvlStar4"></div></button>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="startGame()">🎮 ເລີ່ມຫຼິ້ນ</button>
    </div>
  </div>

  <!-- WIN -->
  <div class="overlay hidden" id="winScreen">
    <div class="ov-emoji">🎉</div>
    <div class="ov-title">ສຳເລັດ!</div>
    <div class="star-rating" id="starRating">⭐⭐⭐</div>
    <div class="stats-grid">
      <div class="stat-item"><div class="stat-value" id="fFlips">0</div><div class="stat-label">ພິກ</div></div>
      <div class="stat-item"><div class="stat-value" id="fTime">0s</div><div class="stat-label">ເວລາ</div></div>
      <div class="stat-item"><div class="stat-value best" id="fBestFlips">-</div><div class="stat-label">ດີທີ່ສຸດ</div></div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="startGame()">🔄 ຫຼິ້ນອີກ</button>
      <button class="btn btn-secondary" onclick="showStart()">🏠 ໜ້າຫຼັກ</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="gameUI" style="display:none;flex-direction:column;height:100vh;height:100dvh">
    <div class="game-header">
      <div class="game-title"><span>🃏</span><span>ຈື່ບັດ</span></div>
      <div class="hdr-info">
        <div class="hdr-stat"><div class="hdr-stat-lbl">ພິກ</div><div class="hdr-stat-val" id="flipCount">0</div></div>
        <div class="hdr-stat"><div class="hdr-stat-lbl">ຄູ່</div><div class="hdr-stat-val" id="matchCount">0/0</div></div>
        <div class="hdr-stat"><div class="hdr-stat-lbl">ເວລາ</div><div class="hdr-stat-val" id="timeDisplay">0s</div></div>
      </div>
    </div>
    <div class="cards-area" id="cardsArea"></div>
  </div>

  <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>

  <script>
    const GID='memory-cards';
    const LEVELS=[
      {cols:3,rows:2,label:'3×2'},
      {cols:4,rows:3,label:'4×3'},
      {cols:4,rows:4,label:'4×4'},
      {cols:5,rows:4,label:'5×4'},
      {cols:6,rows:5,label:'6×5'},
    ];
    const EMOJIS=['🍎','🍊','🍋','🍇','🍓','🍒','🥝','🍑','🌽','🥕','🍔','🍕','🎂','🍩','🧁','🍫','🐶','🐱','🐰','🦊','🐼','🐨','🦁','🐸','🦋','🐝','🌸','🌻','⭐','🌈','❤️','💎'];

    let selectedLevel=0,flips=0,matches=0,totalPairs=0,gameOn=false;
    let firstCard=null,secondCard=null,locked=false;
    let startTime=0,timerInterval=null;

    // Storage
    function sv(k,v){try{localStorage.setItem(`game_${GID}_${k}`,JSON.stringify(v))}catch(e){}}
    function ld(k,d=null){try{const r=localStorage.getItem(`game_${GID}_${k}`);return r!==null?JSON.parse(r):d}catch(e){return d}}

    // Audio
    let aC=null,snd=true;
    function initA(){if(!aC)aC=new(window.AudioContext||window.webkitAudioContext)();if(aC.state==='suspended')aC.resume()}
    function tone(f,d,t='sine',v=0.15){if(!snd||!aC)return;if(aC.state==='suspended'){aC.resume().then(()=>tone(f,d,t,v));return;}try{const o=aC.createOscillator(),g=aC.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,aC.currentTime+d/1000);o.connect(g);g.connect(aC.destination);o.start();o.stop(aC.currentTime+d/1000)}catch(e){}}
    function toggleSound(){snd=!snd;document.getElementById('soundBtn').textContent=snd?'🔊':'🔇'}
    function vib(p){if(navigator.vibrate)navigator.vibrate(p)}
    // Mobile audio unlock
    (function(){function u(){initA();document.removeEventListener('touchstart',u,true);document.removeEventListener('touchend',u,true);document.removeEventListener('click',u,true)}document.addEventListener('touchstart',u,true);document.addEventListener('touchend',u,true);document.addEventListener('click',u,true)})()

    function selectLevel(l){
      selectedLevel=l;
      document.querySelectorAll('.level-btn').forEach((b,i)=>b.classList.toggle('active',i===l));
    }

    function shuffle(arr){
      for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}
      return arr;
    }

    function startGame(){
      initA();
      const lvl=LEVELS[selectedLevel];
      totalPairs=(lvl.cols*lvl.rows)/2;
      flips=0;matches=0;gameOn=true;locked=false;
      firstCard=null;secondCard=null;

      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('winScreen').classList.add('hidden');
      document.getElementById('gameUI').style.display='flex';
      document.getElementById('flipCount').textContent='0';
      document.getElementById('matchCount').textContent=`0/${totalPairs}`;
      document.getElementById('timeDisplay').textContent='0s';

      // Build cards
      const area=document.getElementById('cardsArea');
      area.innerHTML='';
      const emojis=shuffle([...EMOJIS]).slice(0,totalPairs);
      const deck=shuffle([...emojis,...emojis]);

      const grid=document.createElement('div');
      grid.className='cards-grid';
      const areaRect=area.getBoundingClientRect();
      const maxW=Math.min(areaRect.width-24,420);
      const maxH=areaRect.height-24;
      const cellW=Math.min((maxW-8*(lvl.cols-1))/lvl.cols,80);
      const cellH=Math.min((maxH-8*(lvl.rows-1))/lvl.rows,80);
      const cellSize=Math.min(cellW,cellH);
      grid.style.gridTemplateColumns=`repeat(${lvl.cols},${cellSize}px)`;
      grid.style.gridTemplateRows=`repeat(${lvl.rows},${cellSize}px)`;

      deck.forEach((emoji,i)=>{
        const card=document.createElement('div');
        card.className='card';
        card.style.width=cellSize+'px';card.style.height=cellSize+'px';
        card.dataset.emoji=emoji;card.dataset.index=i;
        card.innerHTML=`<div class="card-inner"><div class="card-front">❓</div><div class="card-back">${emoji}</div></div>`;
        card.addEventListener('click',()=>flipCard(card));
        grid.appendChild(card);
      });

      area.appendChild(grid);
      startTime=Date.now();
      if(timerInterval)clearInterval(timerInterval);
      timerInterval=setInterval(()=>{
        if(!gameOn)return;
        document.getElementById('timeDisplay').textContent=Math.floor((Date.now()-startTime)/1000)+'s';
      },1000);
    }

    function flipCard(card){
      if(!gameOn||locked)return;
      if(card.classList.contains('flipped')||card.classList.contains('matched'))return;

      card.classList.add('flipped');
      flips++;
      document.getElementById('flipCount').textContent=flips;
      tone(400+matches*50,50);vib(15);

      if(!firstCard){
        firstCard=card;
      }else{
        secondCard=card;
        locked=true;
        checkMatch();
      }
    }

    function checkMatch(){
      if(firstCard.dataset.emoji===secondCard.dataset.emoji){
        // Match!
        matches++;
        document.getElementById('matchCount').textContent=`${matches}/${totalPairs}`;
        setTimeout(()=>{
          firstCard.classList.add('matched');secondCard.classList.add('matched');
          tone(523,80);setTimeout(()=>tone(659,80),80);setTimeout(()=>tone(784,100),160);
          vib([30,30,30]);
          firstCard=null;secondCard=null;locked=false;
          if(matches===totalPairs)winGame();
        },400);
      }else{
        // No match
        setTimeout(()=>{
          firstCard.classList.remove('flipped');secondCard.classList.remove('flipped');
          tone(200,100,'square',0.1);
          firstCard=null;secondCard=null;locked=false;
        },800);
      }
    }

    function winGame(){
      gameOn=false;
      if(timerInterval)clearInterval(timerInterval);
      const time=Math.floor((Date.now()-startTime)/1000);

      // Star rating based on flips vs perfect (totalPairs flips)
      const perfect=totalPairs;
      const ratio=flips/perfect;
      let stars=ratio<=1.5?3:ratio<=2.5?2:1;

      // Save best
      const bestKey=`best_${selectedLevel}`;
      const prev=ld(bestKey,null);
      let isBest=false;
      if(!prev||flips<prev){sv(bestKey,flips);isBest=true}
      sv(`stars_${selectedLevel}`,Math.max(ld(`stars_${selectedLevel}`,0),stars));

      document.getElementById('fFlips').textContent=flips;
      document.getElementById('fTime').textContent=time+'s';
      document.getElementById('fBestFlips').textContent=ld(bestKey,'-');
      document.getElementById('starRating').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);

      setTimeout(()=>document.getElementById('winScreen').classList.remove('hidden'),300);
    }

    function showStart(){
      document.getElementById('startScreen').classList.remove('hidden');
      document.getElementById('winScreen').classList.add('hidden');
      document.getElementById('gameUI').style.display='none';
      if(timerInterval)clearInterval(timerInterval);
      // Update level stars
      for(let i=0;i<LEVELS.length;i++){
        const s=ld(`stars_${i}`,0);
        document.getElementById(`lvlStar${i}`).textContent=s>0?'⭐'.repeat(s):'';
      }
    }

    // Init stars
    for(let i=0;i<LEVELS.length;i++){
      const s=ld(`stars_${i}`,0);
      document.getElementById(`lvlStar${i}`).textContent=s>0?'⭐'.repeat(s):'';
    }
  </script>
</body>
</html>
