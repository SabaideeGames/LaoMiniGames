<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ສີສະທ້ອນ — Color Reflex</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg-primary: #0f0f1a;
      --bg-glass: rgba(255, 255, 255, 0.08);
      --border-glass: rgba(255, 255, 255, 0.12);
      --text-primary: #f0f0f5;
      --text-secondary: #a0a0b8;
      --accent-gradient: linear-gradient(135deg, #7C3AED 0%, #2563EB 100%);
      --accent-glow: rgba(124, 58, 237, 0.3);
      --success: #10B981;
      --danger: #EF4444;
      --font-family: 'Noto Sans Lao', 'Phetsarath OT', 'Saysettha OT', system-ui, sans-serif;
    }

    body {
      font-family: var(--font-family);
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh; height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
      touch-action: none;
      user-select: none; -webkit-user-select: none;
      display: flex; flex-direction: column;
    }

    /* Background */
    .bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
    .bg::before {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(37,99,235,0.06) 0%, transparent 50%);
    }

    /* === OVERLAY === */
    .overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(15,15,26,0.9);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 24px;
      opacity: 1; transition: opacity 0.4s;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }
    .ov-emoji { font-size: 4rem; margin-bottom: 12px; animation: bounceIn 0.5s ease; }
    @keyframes bounceIn { 0%{transform:scale(0)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }
    .ov-title { font-size: 2.5rem; font-weight: 800; text-align: center; margin-bottom: 6px; }
    .ov-sub { font-size: 1rem; color: var(--text-secondary); text-align: center; margin-bottom: 32px; max-width: 300px; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 16px 40px; border: none; border-radius: 999px;
      font-family: var(--font-family); font-size: 1.15rem; font-weight: 600;
      cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden;
      touch-action: manipulation; min-width: 220px;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: var(--accent-gradient); color: white; box-shadow: 0 0 20px var(--accent-glow); }
    .btn-secondary { background: var(--bg-glass); color: var(--text-primary); border: 1px solid var(--border-glass); }
    .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 260px; }

    /* Stats */
    .stats-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 12px; width: 100%; max-width: 300px; margin-bottom: 24px;
    }
    .stat-item {
      text-align: center; padding: 14px 8px;
      background: var(--bg-glass); border: 1px solid var(--border-glass); border-radius: 12px;
    }
    .stat-value { font-size: 1.8rem; font-weight: 700; }
    .stat-value.best { background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-label { font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px; }
    .new-record {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 14px; border-radius: 999px; font-size: 0.8rem; font-weight: 600;
      background: rgba(16,185,129,0.15); color: var(--success);
      margin-bottom: 16px;
      animation: scaleIn 0.4s ease 0.3s both;
    }
    @keyframes scaleIn { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }
    .new-record.hidden { display: none; }

    /* Color preview on start */
    .color-circles {
      display: flex; gap: 12px; margin-bottom: 24px;
    }
    .color-circle {
      width: 40px; height: 40px; border-radius: 50%;
      animation: colorPop 0.4s ease backwards;
    }
    .color-circle:nth-child(1) { background: #EF4444; animation-delay: 0.1s; }
    .color-circle:nth-child(2) { background: #3B82F6; animation-delay: 0.2s; }
    .color-circle:nth-child(3) { background: #10B981; animation-delay: 0.3s; }
    .color-circle:nth-child(4) { background: #F59E0B; animation-delay: 0.4s; }
    @keyframes colorPop { from{opacity:0;transform:scale(0)} to{opacity:1;transform:scale(1)} }

    /* === GAME UI === */
    .game-ui {
      display: none; flex-direction: column;
      height: 100vh; height: 100dvh;
    }

    .game-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; z-index: 10;
    }
    @supports (padding: env(safe-area-inset-top)) {
      .game-header { padding-top: calc(12px + env(safe-area-inset-top)); }
    }
    .game-title { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .header-scores { display: flex; gap: 16px; }
    .header-score { text-align: center; }
    .header-score-label { font-size: 0.65rem; color: var(--text-secondary); }
    .header-score-value { font-size: 1.1rem; font-weight: 700; }
    .header-score-value.best { background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* Main game area */
    .game-main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 16px; gap: 24px;
    }

    /* Target indicator */
    .target-area {
      text-align: center;
    }
    .target-label {
      font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px;
    }
    .target-color {
      width: 90px; height: 90px; border-radius: 50%;
      margin: 0 auto;
      border: 4px solid rgba(255,255,255,0.2);
      transition: background-color 0.3s ease;
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
    }
    .target-name {
      font-size: 1rem; font-weight: 600; margin-top: 10px;
      min-height: 1.6em;
    }

    /* Color buttons */
    .color-buttons {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 14px; width: 100%; max-width: 320px;
    }
    .color-btn {
      aspect-ratio: 1; border-radius: 20px; border: 3px solid rgba(255,255,255,0.1);
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform 0.15s, border-color 0.15s;
      touch-action: manipulation; min-height: 90px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-family); font-size: 0.85rem; font-weight: 600;
      color: rgba(255,255,255,0.9); text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }
    .color-btn:active { transform: scale(0.92); }
    .color-btn.correct {
      border-color: white !important;
      animation: correctFlash 0.3s ease;
    }
    .color-btn.wrong {
      animation: wrongShake 0.4s ease;
    }
    @keyframes correctFlash {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.5); }
      100% { filter: brightness(1); }
    }
    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Timer bar */
    .timer-bar-container {
      width: 100%; max-width: 320px; height: 6px;
      background: rgba(255,255,255,0.1); border-radius: 3px;
      overflow: hidden;
    }
    .timer-bar {
      height: 100%; border-radius: 3px;
      background: var(--accent-gradient);
      transition: width 0.1s linear;
    }
    .timer-bar.low { background: linear-gradient(90deg, var(--danger), #F97316); }

    /* Score popup */
    .score-popup {
      position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
      font-size: 2rem; font-weight: 800; opacity: 0; pointer-events: none; z-index: 50;
    }
    .score-popup.show { animation: popUp 0.6s ease-out forwards; }
    @keyframes popUp {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%, -60%) scale(1); }
    }

    /* Combo display */
    .combo-display {
      font-size: 0.9rem; font-weight: 600;
      color: var(--text-secondary); min-height: 1.5em;
      transition: all 0.2s;
    }
    .combo-display.active {
      color: #F59E0B;
      animation: pulse 0.3s ease;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

    /* Sound button */
    .sound-btn {
      position: fixed; top: 12px; right: 12px; z-index: 200;
      width: 44px; height: 44px; padding: 0; border-radius: 50%;
      font-size: 1.2rem; min-width: 0;
      background: var(--bg-glass); color: var(--text-primary);
      border: 1px solid var(--border-glass);
      cursor: pointer; touch-action: manipulation;
    }
    @supports (padding: env(safe-area-inset-top)) {
      .sound-btn { top: calc(12px + env(safe-area-inset-top)); }
    }

    /* High score on start */
    .start-best { margin-top: 20px; text-align: center; }
    .start-best-label { font-size: 0.7rem; color: var(--text-secondary); }
    .start-best-value { font-size: 1.3rem; font-weight: 700; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  </style>
</head>
<body>

  <div class="bg"></div>

  <!-- ===== START SCREEN ===== -->
  <div class="overlay" id="startScreen">
    <div class="color-circles">
      <div class="color-circle"></div>
      <div class="color-circle"></div>
      <div class="color-circle"></div>
      <div class="color-circle"></div>
    </div>
    <div class="ov-title">ສີສະທ້ອນ</div>
    <div class="ov-sub">ແຕະສີທີ່ກົງກັບວົງກົມເປົ້າໝາຍ — ໃຫ້ໄວທີ່ສຸດ!</div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="startGame()">🎮 ເລີ່ມຫຼິ້ນ</button>
    </div>
    <div class="start-best">
      <div class="start-best-label">ຄະແນນສູງສຸດ</div>
      <div class="start-best-value" id="startBest">0</div>
    </div>
  </div>

  <!-- ===== GAME OVER SCREEN ===== -->
  <div class="overlay hidden" id="gameOverScreen">
    <div class="ov-emoji" id="gameOverEmoji">😢</div>
    <div class="ov-title">ຈົບເກມ</div>
    <div class="new-record hidden" id="newRecordBadge">🏆 ສະຖິຕິໃໝ່!</div>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-value" id="finalScore">0</div>
        <div class="stat-label">ຄະແນນ</div>
      </div>
      <div class="stat-item">
        <div class="stat-value best" id="finalBest">0</div>
        <div class="stat-label">ດີທີ່ສຸດ</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="finalCombo">0</div>
        <div class="stat-label">ຄອມໂບສູງສຸດ</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="finalGames">0</div>
        <div class="stat-label">ຫຼິ້ນແລ້ວ</div>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="startGame()">🔄 ລອງໃໝ່</button>
      <button class="btn btn-secondary" onclick="showStart()">🏠 ໜ້າຫຼັກ</button>
    </div>
  </div>

  <!-- ===== GAME UI ===== -->
  <div class="game-ui" id="gameUI">
    <div class="game-header">
      <div class="game-title"><span>🎨</span><span>ສີສະທ້ອນ</span></div>
      <div class="header-scores">
        <div class="header-score">
          <div class="header-score-label">ຄະແນນ</div>
          <div class="header-score-value" id="scoreDisplay">0</div>
        </div>
        <div class="header-score">
          <div class="header-score-label">ດີທີ່ສຸດ</div>
          <div class="header-score-value best" id="bestDisplay">0</div>
        </div>
      </div>
    </div>

    <div class="game-main">
      <div class="timer-bar-container">
        <div class="timer-bar" id="timerBar"></div>
      </div>

      <div class="combo-display" id="comboDisplay"></div>

      <div class="target-area">
        <div class="target-label">ແຕະສີນີ້ ↓</div>
        <div class="target-color" id="targetColor"></div>
        <div class="target-name" id="targetName"></div>
      </div>

      <div class="color-buttons" id="colorButtons">
        <div class="color-btn" data-color="0"></div>
        <div class="color-btn" data-color="1"></div>
        <div class="color-btn" data-color="2"></div>
        <div class="color-btn" data-color="3"></div>
      </div>
    </div>
  </div>

  <div class="score-popup" id="scorePopup"></div>
  <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>

  <script>
    // =============================================
    // CONSTANTS
    // =============================================
    const GAME_ID = 'color-reflex';
    const COLORS = [
      { bg: '#EF4444', name: 'ແດງ',   shadow: 'rgba(239,68,68,0.4)' },    // Red
      { bg: '#3B82F6', name: 'ຟ້າ',    shadow: 'rgba(59,130,246,0.4)' },    // Blue
      { bg: '#10B981', name: 'ຂຽວ',    shadow: 'rgba(16,185,129,0.4)' },    // Green
      { bg: '#F59E0B', name: 'ເຫຼືອງ', shadow: 'rgba(245,158,11,0.4)' },   // Yellow
      { bg: '#8B5CF6', name: 'ມ່ວງ',   shadow: 'rgba(139,92,246,0.4)' },    // Purple
      { bg: '#EC4899', name: 'ບົວ',     shadow: 'rgba(236,72,153,0.4)' },    // Pink
      { bg: '#06B6D4', name: 'ຟ້າຄາມ', shadow: 'rgba(6,182,212,0.4)' },     // Cyan
      { bg: '#F97316', name: 'ສົ້ມ',    shadow: 'rgba(249,115,22,0.4)' },    // Orange
    ];

    const INITIAL_TIME = 5000; // 5 seconds
    const MIN_TIME = 1500;     // minimum 1.5 seconds
    const TIME_DECREASE = 100; // decrease per correct answer

    // =============================================
    // STATE
    // =============================================
    let gameRunning = false;
    let score = 0;
    let combo = 0;
    let bestCombo = 0;
    let targetIdx = 0;
    let buttonColors = [];
    let timeLeft = INITIAL_TIME;
    let maxTime = INITIAL_TIME;
    let timerInterval = null;
    let lastTimestamp = 0;

    // Audio
    let audioCtx = null;
    let soundEnabled = true;

    // =============================================
    // STORAGE
    // =============================================
    function save(k, v) { try { localStorage.setItem(`game_${GAME_ID}_${k}`, JSON.stringify(v)); } catch(e) {} }
    function load(k, d = null) { try { const r = localStorage.getItem(`game_${GAME_ID}_${k}`); return r !== null ? JSON.parse(r) : d; } catch(e) { return d; } }
    function getHS() { return load('highScore', 0); }
    function updateHS(s) { const b = getHS(); if (s > b) { save('highScore', s); return true; } return false; }
    function incGames() { const g = load('totalGames', 0) + 1; save('totalGames', g); return g; }

    // =============================================
    // AUDIO
    // =============================================
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playTone(freq, dur, type = 'sine', vol = 0.2) {
      if (!soundEnabled || !audioCtx) return;
      try {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = type; o.frequency.value = freq; g.gain.value = vol;
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur / 1000);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + dur / 1000);
      } catch(e) {}
    }
    function playCorrect() {
      const baseFreq = 523 + combo * 30;
      playTone(baseFreq, 80, 'sine', 0.2);
      setTimeout(() => playTone(baseFreq * 1.25, 100, 'sine', 0.2), 60);
    }
    function playWrong() { playTone(200, 250, 'sawtooth', 0.15); }
    function toggleSound() {
      soundEnabled = !soundEnabled;
      document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
    }
    function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }

    // Mobile audio unlock
    (function(){function u(){initAudio();document.removeEventListener('touchstart',u,true);document.removeEventListener('touchend',u,true);document.removeEventListener('click',u,true)}document.addEventListener('touchstart',u,true);document.addEventListener('touchend',u,true);document.addEventListener('click',u,true)})()

    // =============================================
    // GAME LOGIC
    // =============================================
    function pickTarget() {
      // Pick 4 random distinct colors for buttons
      const indices = [];
      while (indices.length < 4) {
        const r = Math.floor(Math.random() * COLORS.length);
        if (!indices.includes(r)) indices.push(r);
      }
      buttonColors = indices;

      // Pick one as target
      targetIdx = indices[Math.floor(Math.random() * 4)];

      // Update UI
      const target = COLORS[targetIdx];
      document.getElementById('targetColor').style.backgroundColor = target.bg;
      document.getElementById('targetColor').style.boxShadow = `0 0 30px ${target.shadow}`;
      document.getElementById('targetName').textContent = target.name;

      const btns = document.querySelectorAll('.color-btn');
      btns.forEach((btn, i) => {
        const c = COLORS[buttonColors[i]];
        btn.style.backgroundColor = c.bg;
        btn.style.boxShadow = `0 4px 15px ${c.shadow}`;
        btn.textContent = c.name;
        btn.dataset.color = buttonColors[i];
        btn.className = 'color-btn'; // reset animations
      });
    }

    function handleColorTap(e) {
      if (!gameRunning) return;
      const btn = e.target.closest('.color-btn');
      if (!btn) return;

      const tapped = parseInt(btn.dataset.color);

      if (tapped === targetIdx) {
        // Correct!
        combo++;
        if (combo > bestCombo) bestCombo = combo;
        
        const points = 1 + Math.floor(combo / 3);
        score += points;

        // Update UI
        document.getElementById('scoreDisplay').textContent = score;
        btn.classList.add('correct');

        // Combo display
        const comboEl = document.getElementById('comboDisplay');
        if (combo >= 2) {
          comboEl.textContent = `🔥 ຄອມໂບ x${combo}`;
          comboEl.classList.add('active');
          setTimeout(() => comboEl.classList.remove('active'), 300);
        }

        // Score popup
        showPopup(`+${points}`, 'var(--success)');

        playCorrect();
        vibrate(30);

        // Reset timer with less time
        maxTime = Math.max(MIN_TIME, INITIAL_TIME - score * TIME_DECREASE);
        timeLeft = maxTime;

        // Next round
        setTimeout(pickTarget, 200);
      } else {
        // Wrong!
        btn.classList.add('wrong');
        playWrong();
        vibrate([80, 30, 80]);
        gameOver();
      }
    }

    function showPopup(text, color) {
      const el = document.getElementById('scorePopup');
      el.textContent = text;
      el.style.color = color;
      el.classList.remove('show');
      void el.offsetWidth;
      el.classList.add('show');
    }

    // =============================================
    // TIMER
    // =============================================
    function startTimer() {
      lastTimestamp = performance.now();
      timerInterval = requestAnimationFrame(updateTimer);
    }

    function updateTimer(now) {
      if (!gameRunning) return;
      const delta = now - lastTimestamp;
      lastTimestamp = now;
      timeLeft -= delta;

      const pct = Math.max(0, (timeLeft / maxTime) * 100);
      const bar = document.getElementById('timerBar');
      bar.style.width = pct + '%';
      bar.classList.toggle('low', pct < 30);

      if (timeLeft <= 0) {
        gameOver();
        return;
      }

      timerInterval = requestAnimationFrame(updateTimer);
    }

    // =============================================
    // GAME CONTROL
    // =============================================
    function startGame() {
      initAudio();
      score = 0;
      combo = 0;
      bestCombo = 0;
      maxTime = INITIAL_TIME;
      timeLeft = maxTime;
      gameRunning = true;

      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('gameOverScreen').classList.add('hidden');
      document.getElementById('gameUI').style.display = 'flex';

      document.getElementById('scoreDisplay').textContent = '0';
      document.getElementById('bestDisplay').textContent = getHS();
      document.getElementById('comboDisplay').textContent = '';
      document.getElementById('timerBar').style.width = '100%';
      document.getElementById('timerBar').classList.remove('low');

      pickTarget();
      startTimer();
    }

    function gameOver() {
      gameRunning = false;
      if (timerInterval) cancelAnimationFrame(timerInterval);

      const isNew = updateHS(score);
      const totalGames = incGames();

      document.getElementById('finalScore').textContent = score;
      document.getElementById('finalBest').textContent = getHS();
      document.getElementById('finalCombo').textContent = bestCombo;
      document.getElementById('finalGames').textContent = totalGames;

      const badge = document.getElementById('newRecordBadge');
      const emoji = document.getElementById('gameOverEmoji');
      if (isNew && score > 0) { badge.classList.remove('hidden'); emoji.textContent = '🏆'; }
      else { badge.classList.add('hidden'); emoji.textContent = score > 5 ? '😊' : '😢'; }

      setTimeout(() => {
        document.getElementById('gameOverScreen').classList.remove('hidden');
      }, 400);
    }

    function showStart() {
      document.getElementById('startScreen').classList.remove('hidden');
      document.getElementById('gameOverScreen').classList.add('hidden');
      document.getElementById('gameUI').style.display = 'none';
      document.getElementById('startBest').textContent = getHS();
    }

    // =============================================
    // INPUT
    // =============================================
    document.getElementById('colorButtons').addEventListener('click', handleColorTap);
    document.getElementById('colorButtons').addEventListener('touchstart', function(e) {
      // Prevent double-firing with click
      e.preventDefault();
      handleColorTap(e);
    }, { passive: false });

    // =============================================
    // INIT
    // =============================================
    document.getElementById('startBest').textContent = getHS();
  </script>
</body>
</html>
