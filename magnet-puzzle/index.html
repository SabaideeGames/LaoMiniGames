<!DOCTYPE html>
<html lang="lo"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>ແມ່ເຫຼັກ — Magnet Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0f0f1a;--bg-glass:rgba(255,255,255,0.08);--border-glass:rgba(255,255,255,0.12);--text:#f0f0f5;--text2:#a0a0b8;--accent:#7C3AED;--accent-grad:linear-gradient(135deg,#7C3AED,#2563EB);--glow:rgba(124,58,237,0.3);--success:#10b981;--font:'Noto Sans Lao','Phetsarath OT',system-ui,sans-serif}body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow:hidden;overscroll-behavior:none;user-select:none;-webkit-user-select:none;display:flex;flex-direction:column}
.bg-dec{position:fixed;inset:0;z-index:-1;pointer-events:none}.bg-dec::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,0.08)0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(37,99,235,0.06)0%,transparent 50%)}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;z-index:10}@supports(padding:env(safe-area-inset-top)){.header{padding-top:calc(12px + env(safe-area-inset-top))}}.title{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}.back{width:44px;height:44px;border-radius:50%;border:1px solid var(--border-glass);background:var(--bg-glass);color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none}
.info{display:flex;gap:8px;font-size:0.85rem;font-weight:600}.pill{background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:999px;padding:4px 12px}
.ga{flex:1;display:flex;align-items:center;justify-content:center;touch-action:none}canvas{display:block;max-width:100%}
.overlay{position:fixed;inset:0;background:rgba(15,15,26,0.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;z-index:200;opacity:1;transition:opacity 0.4s}.overlay.hidden{opacity:0;pointer-events:none}
.ov-emoji{font-size:4rem;margin-bottom:16px;animation:bounceIn 0.5s}.ov-title{font-size:2.2rem;font-weight:800;margin-bottom:8px;text-align:center}.ov-sub{font-size:1rem;color:var(--text2);margin-bottom:24px;text-align:center}@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 40px;border:none;border-radius:999px;font-family:var(--font);font-size:1.15rem;font-weight:600;cursor:pointer;transition:all 0.25s;touch-action:manipulation;min-width:220px}.btn:active{transform:scale(0.96)}.btn-primary{background:var(--accent-grad);color:white;box-shadow:0 0 20px var(--glow)}.btn-secondary{background:var(--bg-glass);color:var(--text);border:1px solid var(--border-glass)}.btn-group{display:flex;flex-direction:column;gap:12px;width:100%;max-width:260px}
.sound-btn{position:fixed;top:12px;right:12px;width:44px;height:44px;border-radius:50%;border:1px solid var(--border-glass);background:var(--bg-glass);color:var(--text);font-size:1.2rem;cursor:pointer;z-index:300;display:flex;align-items:center;justify-content:center}
</style></head><body><div class="bg-dec"></div>
<div class="overlay" id="startScr"><div class="ov-emoji">🧲</div><div class="ov-title">ແມ່ເຫຼັກ</div><div class="ov-sub">ວາງແມ່ເຫຼັກ — ນຳບານເຂົ້າປະຕູ!</div>
<div class="btn-group"><button class="btn btn-primary" onclick="startGame()">🧲 ເລີ່ມ</button><a href="../index.html" class="btn btn-secondary" style="text-decoration:none">🏠 ກັບໜ້າຫຼັກ</a></div></div>
<div class="overlay hidden" id="winScr"><div class="ov-emoji">🎉</div><div class="ov-title">ສຳເລັດ!</div><div class="ov-sub" id="winSub">ດ່ານ 1</div>
<div class="btn-group"><button class="btn btn-primary" onclick="nextLevel()">▶️ ດ່ານຕໍ່ໄປ</button><a href="../index.html" class="btn btn-secondary" style="text-decoration:none">🏠 ກັບໜ້າຫຼັກ</a></div></div>
<div class="header" id="hdr" style="display:none"><a href="../index.html" class="back">←</a><div class="title"><span>🧲</span><span>ດ່ານ <span id="lvlNum">1</span></span></div><div class="info"><div class="pill" id="magInfo">🧲 3</div><div class="pill" onclick="resetLevel()">🔄</div></div></div>
<div class="ga" id="gameArea" style="display:none"><canvas id="c"></canvas></div>
<button class="sound-btn" id="snd" onclick="sndOn=!sndOn;this.textContent=sndOn?'🔊':'🔇'">🔊</button>
<script>
const GID='magnet-puzzle',cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H,ball,goal,magnets,walls,maxMagnets,level=1,simulating=false,sndOn=true,ac=null;
const LEVELS=[
  {ball:{x:60,y:200},goal:{x:300,y:200},walls:[],maxMag:2},
  {ball:{x:60,y:100},goal:{x:300,y:300},walls:[{x:150,y:0,w:20,h:250}],maxMag:2},
  {ball:{x:60,y:300},goal:{x:300,y:60},walls:[{x:100,y:100,w:200,h:20},{x:200,y:200,w:20,h:150}],maxMag:3},
  {ball:{x:30,y:180},goal:{x:340,y:180},walls:[{x:120,y:80,w:20,h:120},{x:230,y:160,w:20,h:120}],maxMag:3},
  {ball:{x:180,y:30},goal:{x:180,y:340},walls:[{x:60,y:140,w:120,h:20},{x:200,y:200,w:120,h:20}],maxMag:3},
  {ball:{x:30,y:30},goal:{x:340,y:340},walls:[{x:100,y:100,w:180,h:20},{x:100,y:240,w:180,h:20}],maxMag:4},
  {ball:{x:340,y:30},goal:{x:30,y:340},walls:[{x:80,y:50,w:20,h:120},{x:180,y:120,w:20,h:150},{x:280,y:200,w:20,h:120}],maxMag:4},
  {ball:{x:30,y:180},goal:{x:340,y:180},walls:[{x:100,y:0,w:20,h:160},{x:100,y:200,w:20,h:200},{x:260,y:0,w:20,h:160},{x:260,y:200,w:20,h:200}],maxMag:5},
];
function save(k,v){try{localStorage.setItem(`game_${GID}_${k}`,JSON.stringify(v))}catch(e){}}
function load(k,d=null){try{const r=localStorage.getItem(`game_${GID}_${k}`);return r!==null?JSON.parse(r):d}catch(e){return d}}
function initAudio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume()}
function playTone(f,d,t='sine',v=0.2){if(!sndOn||!ac)return;if(ac.state==='suspended'){ac.resume().then(()=>playTone(f,d,t,v));return;}try{const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d/1000);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d/1000)}catch(e){}}
(function(){function u(){initAudio();document.removeEventListener('touchstart',u,true);document.removeEventListener('touchend',u,true);document.removeEventListener('click',u,true)}document.addEventListener('touchstart',u,true);document.addEventListener('touchend',u,true);document.addEventListener('click',u,true)})();

function resize(){const a=document.getElementById('gameArea'),r=a.getBoundingClientRect(),dp=devicePixelRatio||1;W=Math.min(r.width-16,380);H=W;cv.style.width=W+'px';cv.style.height=H+'px';cv.width=W*dp;cv.height=H*dp;cx.scale(dp,dp)}

function loadLevel(){
  const l=LEVELS[(level-1)%LEVELS.length];
  ball={x:l.ball.x,y:l.ball.y,vx:0,vy:0,r:10};
  goal={x:l.goal.x,y:l.goal.y,r:16};
  walls=l.walls.map(w=>({...w}));maxMagnets=l.maxMag;magnets=[];simulating=false;
  document.getElementById('lvlNum').textContent=level;document.getElementById('magInfo').textContent=`🧲 ${maxMagnets}`;draw()
}

cv.addEventListener('click',e=>{
  if(simulating)return;if(magnets.length>=maxMagnets)return;
  const rect=cv.getBoundingClientRect();const x=e.clientX-rect.left,y=e.clientY-rect.top;
  // Check not on wall or ball
  for(const w of walls)if(x>w.x&&x<w.x+w.w&&y>w.y&&y<w.y+w.h)return;
  magnets.push({x,y});document.getElementById('magInfo').textContent=`🧲 ${maxMagnets-magnets.length}`;
  playTone(500,30,'sine',0.1);draw();
  if(magnets.length>=maxMagnets)simulate()
});

function draw(){
  cx.clearRect(0,0,W,H);cx.fillStyle='#0f0f1a';cx.fillRect(0,0,W,H);
  // Grid
  cx.strokeStyle='rgba(255,255,255,0.03)';cx.lineWidth=1;
  for(let i=0;i<W;i+=40){cx.beginPath();cx.moveTo(i,0);cx.lineTo(i,H);cx.stroke();cx.beginPath();cx.moveTo(0,i);cx.lineTo(W,i);cx.stroke()}
  // Walls
  walls.forEach(w=>{cx.fillStyle='rgba(255,255,255,0.15)';cx.beginPath();cx.roundRect(w.x,w.y,w.w,w.h,4);cx.fill()});
  // Goal
  cx.beginPath();cx.arc(goal.x,goal.y,goal.r,0,Math.PI*2);cx.fillStyle='rgba(16,185,129,0.2)';cx.fill();cx.strokeStyle='#10b981';cx.lineWidth=2;cx.stroke();
  cx.fillStyle='#10b981';cx.font='16px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('⭐',goal.x,goal.y);
  // Magnets
  magnets.forEach(m=>{cx.beginPath();cx.arc(m.x,m.y,12,0,Math.PI*2);cx.fillStyle='rgba(124,58,237,0.2)';cx.fill();cx.strokeStyle='#7C3AED';cx.lineWidth=2;cx.stroke();
    // Field lines
    for(let a=0;a<Math.PI*2;a+=Math.PI/4){cx.beginPath();cx.moveTo(m.x+Math.cos(a)*14,m.y+Math.sin(a)*14);cx.lineTo(m.x+Math.cos(a)*22,m.y+Math.sin(a)*22);cx.strokeStyle='rgba(124,58,237,0.3)';cx.lineWidth=1;cx.stroke()}
  });
  // Ball
  cx.beginPath();cx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);cx.fillStyle='#EF4444';cx.fill();cx.strokeStyle='white';cx.lineWidth=1.5;cx.stroke()
}

function simulate(){
  simulating=true;const dt=1/60;const friction=0.97;let steps=0;
  function step(){
    if(!simulating)return;
    // Magnet forces
    let fx=0,fy=0;
    magnets.forEach(m=>{const dx=m.x-ball.x,dy=m.y-ball.y;const d=Math.sqrt(dx*dx+dy*dy)||1;const f=Math.min(500/(d*d),8);fx+=dx/d*f;fy+=dy/d*f});
    ball.vx=(ball.vx+fx*dt)*friction;ball.vy=(ball.vy+fy*dt)*friction;
    ball.x+=ball.vx;ball.y+=ball.vy;
    // Wall collision
    if(ball.x<ball.r){ball.x=ball.r;ball.vx*=-0.5}if(ball.x>W-ball.r){ball.x=W-ball.r;ball.vx*=-0.5}
    if(ball.y<ball.r){ball.y=ball.r;ball.vy*=-0.5}if(ball.y>H-ball.r){ball.y=H-ball.r;ball.vy*=-0.5}
    walls.forEach(w=>{
      const cx1=Math.max(w.x,Math.min(ball.x,w.x+w.w)),cy1=Math.max(w.y,Math.min(ball.y,w.y+w.h));
      const dx=ball.x-cx1,dy=ball.y-cy1;const d=Math.sqrt(dx*dx+dy*dy);
      if(d<ball.r&&d>0){ball.x+=dx/d*(ball.r-d);ball.y+=dy/d*(ball.r-d);ball.vx*=-0.5;ball.vy*=-0.5}
    });
    // Check goal
    const gd=Math.sqrt((ball.x-goal.x)**2+(ball.y-goal.y)**2);
    if(gd<goal.r){simulating=false;win();return}
    draw();steps++;if(steps>600){simulating=false;fail();return}
    requestAnimationFrame(step)
  }
  step()
}
function win(){
  save('maxLvl',Math.max(level,load('maxLvl',0)));
  playTone(523,100,'sine',0.3);setTimeout(()=>playTone(659,100,'sine',0.3),100);setTimeout(()=>playTone(784,200,'sine',0.3),200);
  if(navigator.vibrate)navigator.vibrate([30,40,30]);
  setTimeout(()=>{document.getElementById('hdr').style.display='none';document.getElementById('gameArea').style.display='none';
    document.getElementById('winSub').textContent=`ດ່ານ ${level} — ${magnets.length} 🧲`;document.getElementById('winScr').classList.remove('hidden')},500)
}
function fail(){playTone(200,200,'sawtooth',0.15);loadLevel()}
function resetLevel(){loadLevel()}
function nextLevel(){level++;startGame()}
function startGame(){
  document.querySelectorAll('.overlay').forEach(o=>o.classList.add('hidden'));
  document.getElementById('hdr').style.display='flex';document.getElementById('gameArea').style.display='flex';
  resize();loadLevel()
}
</script></body></html>
