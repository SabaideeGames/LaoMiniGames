<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ກົດຄຸກກີ — Cookie Clicker</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
    :root{--bg:#0f0f1a;--bg-glass:rgba(255,255,255,0.08);--border-glass:rgba(255,255,255,0.12);--text:#f0f0f5;--text2:#a0a0b8;--accent-grad:linear-gradient(135deg,#7C3AED,#2563EB);--glow:rgba(124,58,237,0.3);--success:#10B981;--warning:#F59E0B;--font:'Noto Sans Lao','Phetsarath OT',system-ui,sans-serif}
    body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow-y:auto;overflow-x:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none}
    .bg{position:fixed;inset:0;z-index:-1;pointer-events:none}
    .bg::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,0.08)0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(37,99,235,0.06)0%,transparent 50%)}

    /* Layout */
    .game{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;max-width:420px;margin:0 auto;padding:0 16px}

    .header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;position:sticky;top:0;z-index:10;background:rgba(15,15,26,0.9);backdrop-filter:blur(8px)}
    @supports(padding:env(safe-area-inset-top)){.header{padding-top:calc(12px+env(safe-area-inset-top))}}
    .header-title{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:6px}
    .header-cps{font-size:0.75rem;color:var(--text2)}

    /* Cookie area */
    .cookie-section{display:flex;flex-direction:column;align-items:center;padding:16px 0}
    .cookie-count{font-size:2.5rem;font-weight:800;background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
    .cookie-label{font-size:0.85rem;color:var(--text2);margin-bottom:16px}
    .cookie-btn{width:140px;height:140px;border-radius:50%;border:none;background:radial-gradient(circle at 35% 35%,#D97706,#92400E);box-shadow:0 6px 30px rgba(217,119,6,0.3);cursor:pointer;font-size:4rem;display:flex;align-items:center;justify-content:center;transition:transform 0.1s;touch-action:manipulation;position:relative}
    .cookie-btn:active{transform:scale(0.92)}
    .cookie-btn::after{content:'';position:absolute;inset:6px;border-radius:50%;border:3px solid rgba(255,255,255,0.1)}

    /* Floating text */
    .float-text{position:absolute;pointer-events:none;font-size:1.2rem;font-weight:700;color:var(--warning);z-index:20;animation:floatUp 0.8s ease-out forwards}
    @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(0.8)}}

    /* Upgrades */
    .section-title{font-size:0.8rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;padding:12px 0 8px;border-top:1px solid var(--border-glass)}
    .upgrade-list{display:flex;flex-direction:column;gap:8px;padding-bottom:24px}
    .upgrade{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:12px;cursor:pointer;transition:all 0.2s;touch-action:manipulation}
    .upgrade:active{transform:scale(0.98)}
    .upgrade.locked{opacity:0.4;pointer-events:none}
    .upgrade.affordable{border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.05)}
    .upgrade-icon{font-size:1.8rem;width:42px;text-align:center;flex-shrink:0}
    .upgrade-info{flex:1;min-width:0}
    .upgrade-name{font-size:0.9rem;font-weight:600;display:flex;justify-content:space-between}
    .upgrade-desc{font-size:0.7rem;color:var(--text2);margin-top:2px}
    .upgrade-cost{font-size:0.8rem;font-weight:600;color:var(--warning);white-space:nowrap}
    .upgrade-count{font-size:0.75rem;color:var(--text2);background:rgba(255,255,255,0.1);padding:2px 8px;border-radius:999px;flex-shrink:0}

    .sound-btn{position:fixed;top:12px;right:12px;z-index:200;width:40px;height:40px;padding:0;border-radius:50%;font-size:1.1rem;background:var(--bg-glass);color:var(--text);border:1px solid var(--border-glass);cursor:pointer;touch-action:manipulation}
    @supports(padding:env(safe-area-inset-top)){.sound-btn{top:calc(12px+env(safe-area-inset-top))}}
    @supports(padding:env(safe-area-inset-bottom)){.game{padding-bottom:env(safe-area-inset-bottom)}}

    .prestige-banner{background:linear-gradient(135deg,#7C3AED,#2563EB);border-radius:12px;padding:14px;text-align:center;margin-bottom:12px;cursor:pointer;touch-action:manipulation;transition:transform 0.2s}
    .prestige-banner:active{transform:scale(0.98)}
    .prestige-banner h3{font-size:1rem;margin-bottom:4px}
    .prestige-banner p{font-size:0.75rem;opacity:0.8}
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="game" id="game">
    <div class="header">
      <div class="header-title"><span>🍪</span><span>ກົດຄຸກກີ</span></div>
      <div class="header-cps" id="cpsDisplay">0 ຄຸກກີ/ວິ</div>
    </div>

    <div class="cookie-section">
      <div class="cookie-count" id="cookieCount">0</div>
      <div class="cookie-label">🍪 ຄຸກກີ</div>
      <button class="cookie-btn" id="cookieBtn" onclick="clickCookie(event)">🍪</button>
    </div>

    <div id="prestigeArea"></div>

    <div class="section-title">⬆️ ອັບເກຣດ</div>
    <div class="upgrade-list" id="upgradeList"></div>
  </div>

  <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>

  <script>
    const GID='cookie-clicker';

    // Upgrades definition
    const UPGRADES=[
      {id:'cursor',icon:'👆',name:'ຕົວຊີ້',desc:'+1 ຄຸກກີ/ຄລິກ',baseCost:15,costMul:1.15,cpc:1,cps:0},
      {id:'grandma',icon:'👵',name:'ແມ່ເຖົ້າ',desc:'+1 ຄຸກກີ/ວິ',baseCost:100,costMul:1.15,cpc:0,cps:1},
      {id:'farm',icon:'🌾',name:'ຟາມ',desc:'+5 ຄຸກກີ/ວິ',baseCost:500,costMul:1.15,cpc:0,cps:5},
      {id:'factory',icon:'🏭',name:'ໂຮງງານ',desc:'+20 ຄຸກກີ/ວິ',baseCost:3000,costMul:1.15,cpc:0,cps:20},
      {id:'mine',icon:'⛏️',name:'ບໍ່ແຮ່',desc:'+50 ຄຸກກີ/ວິ',baseCost:10000,costMul:1.15,cpc:0,cps:50},
      {id:'bank',icon:'🏦',name:'ທະນາຄານ',desc:'+150 ຄຸກກີ/ວິ',baseCost:50000,costMul:1.15,cpc:0,cps:150},
      {id:'temple',icon:'🏛️',name:'ວັດ',desc:'+500 ຄຸກກີ/ວິ',baseCost:200000,costMul:1.15,cpc:0,cps:500},
      {id:'wizard',icon:'🧙',name:'ນັກເວດ',desc:'+2000 ຄຸກກີ/ວິ',baseCost:1000000,costMul:1.15,cpc:0,cps:2000},
    ];

    let cookies=0, totalCookies=0, cpc=1, cps=0;
    let owned={};
    let prestigeMultiplier=1;
    let prestigeCount=0;

    function sv(k,v){try{localStorage.setItem(`game_${GID}_${k}`,JSON.stringify(v))}catch(e){}}
    function ld(k,d=null){try{const r=localStorage.getItem(`game_${GID}_${k}`);return r!==null?JSON.parse(r):d}catch(e){return d}}

    let aC=null,snd=true;
    function initA(){if(!aC)aC=new(window.AudioContext||window.webkitAudioContext)();if(aC.state==='suspended')aC.resume()}
    function tone(f,d,t='sine',v=0.12){if(!snd||!aC)return;try{const o=aC.createOscillator(),g=aC.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,aC.currentTime+d/1000);o.connect(g);g.connect(aC.destination);o.start();o.stop(aC.currentTime+d/1000)}catch(e){}}
    function toggleSound(){snd=!snd;document.getElementById('soundBtn').textContent=snd?'🔊':'🔇'}
    function vib(p){if(navigator.vibrate)navigator.vibrate(p)}

    function fmt(n){
      if(n>=1e12)return(n/1e12).toFixed(1)+'T';
      if(n>=1e9)return(n/1e9).toFixed(1)+'B';
      if(n>=1e6)return(n/1e6).toFixed(1)+'M';
      if(n>=1e3)return(n/1e3).toFixed(1)+'K';
      return Math.floor(n).toString();
    }

    function getCost(upg){
      const count=owned[upg.id]||0;
      return Math.floor(upg.baseCost*Math.pow(upg.costMul,count));
    }

    function clickCookie(e){
      initA();
      const gain=cpc*prestigeMultiplier;
      cookies+=gain;totalCookies+=gain;
      tone(400+Math.random()*200,40,'sine',0.1);
      vib(10);

      // Float text
      const btn=document.getElementById('cookieBtn');
      const rect=btn.getBoundingClientRect();
      const ft=document.createElement('div');
      ft.className='float-text';
      ft.textContent=`+${fmt(gain)}`;
      ft.style.left=(rect.left+rect.width/2-20)+'px';
      ft.style.top=(rect.top-10)+'px';
      document.body.appendChild(ft);
      setTimeout(()=>ft.remove(),800);

      updateUI();
    }

    function buyUpgrade(idx){
      const upg=UPGRADES[idx];
      const cost=getCost(upg);
      if(cookies<cost)return;
      cookies-=cost;
      owned[upg.id]=(owned[upg.id]||0)+1;
      cpc+=upg.cpc;
      cps+=upg.cps;
      tone(523,60);tone(659,60);vib(20);
      updateUI();saveGame();
    }

    function updateUI(){
      document.getElementById('cookieCount').textContent=fmt(cookies);
      document.getElementById('cpsDisplay').textContent=`${fmt(cps*prestigeMultiplier)} ຄຸກກີ/ວິ`;

      const list=document.getElementById('upgradeList');
      list.innerHTML='';
      UPGRADES.forEach((upg,i)=>{
        const cost=getCost(upg);
        const count=owned[upg.id]||0;
        const affordable=cookies>=cost;
        const visible=count>0||cookies>=cost*0.5||totalCookies>=upg.baseCost*0.3;
        if(!visible)return;

        const div=document.createElement('div');
        div.className='upgrade'+(affordable?' affordable':'')+(cookies<cost&&count===0?' locked':'');
        div.onclick=()=>buyUpgrade(i);
        div.innerHTML=`
          <div class="upgrade-icon">${upg.icon}</div>
          <div class="upgrade-info">
            <div class="upgrade-name"><span>${upg.name}</span><span class="upgrade-cost">🍪 ${fmt(cost)}</span></div>
            <div class="upgrade-desc">${upg.desc}</div>
          </div>
          ${count>0?`<div class="upgrade-count">${count}</div>`:''}
        `;
        list.appendChild(div);
      });

      // Prestige
      const pa=document.getElementById('prestigeArea');
      if(totalCookies>=100000){
        const chips=Math.floor(Math.sqrt(totalCookies/100000));
        pa.innerHTML=`<div class="prestige-banner" onclick="doPrestige()">
          <h3>⭐ ກຳເນີດໃໝ່</h3>
          <p>ຣີເຊັດ ແລະ ຮັບ ${chips} ຊິບ → x${1+chips*0.1} ໂບນັສ</p>
        </div>`;
      }else{pa.innerHTML=''}
    }

    function doPrestige(){
      if(totalCookies<100000)return;
      const chips=Math.floor(Math.sqrt(totalCookies/100000));
      prestigeCount+=chips;
      prestigeMultiplier=1+prestigeCount*0.1;
      cookies=0;totalCookies=0;cpc=1;cps=0;
      owned={};
      tone(880,150);setTimeout(()=>tone(1108,150),100);
      vib([50,30,50,30,80]);
      updateUI();saveGame();
    }

    // Auto-generate cookies per second
    let lastTick=Date.now();
    function tick(){
      const now=Date.now();
      const dt=(now-lastTick)/1000;
      lastTick=now;
      if(cps>0){
        const gain=cps*dt*prestigeMultiplier;
        cookies+=gain;totalCookies+=gain;
      }
      updateUI();
    }
    setInterval(tick,100);

    // Save/Load
    function saveGame(){
      sv('save',{cookies,totalCookies,cpc,cps,owned,prestigeCount,prestigeMultiplier,lastSave:Date.now()});
    }
    function loadGame(){
      const s=ld('save',null);
      if(!s)return;
      cookies=s.cookies||0;totalCookies=s.totalCookies||0;
      cpc=s.cpc||1;cps=s.cps||0;
      owned=s.owned||{};
      prestigeCount=s.prestigeCount||0;
      prestigeMultiplier=s.prestigeMultiplier||1;

      // Offline earnings
      if(s.lastSave&&cps>0){
        const offlineSec=Math.min((Date.now()-s.lastSave)/1000,86400);// max 24h
        const offlineGain=cps*offlineSec*prestigeMultiplier*0.5;// 50% efficiency
        if(offlineGain>1){cookies+=offlineGain;totalCookies+=offlineGain}
      }
    }

    // Auto-save
    setInterval(saveGame,10000);
    window.addEventListener('beforeunload',saveGame);
    document.addEventListener('visibilitychange',()=>{if(document.hidden)saveGame()});

    loadGame();updateUI();
  </script>
</body>
</html>
