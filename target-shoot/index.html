<!DOCTYPE html>
<html lang="lo"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>ຍິງເປົ້າ — Target Shoot</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0f0f1a;--bg-glass:rgba(255,255,255,0.08);--border-glass:rgba(255,255,255,0.12);--text:#f0f0f5;--text2:#a0a0b8;--accent:#7C3AED;--accent-grad:linear-gradient(135deg,#7C3AED,#2563EB);--glow:rgba(124,58,237,0.3);--success:#10b981;--danger:#ef4444;--font:'Noto Sans Lao','Phetsarath OT',system-ui,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow:hidden;overscroll-behavior:none;user-select:none;-webkit-user-select:none;display:flex;flex-direction:column}
.bg-dec{position:fixed;inset:0;z-index:-1;pointer-events:none}.bg-dec::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,0.08)0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(37,99,235,0.06)0%,transparent 50%)}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;z-index:10}@supports(padding:env(safe-area-inset-top)){.header{padding-top:calc(12px + env(safe-area-inset-top))}}.title{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}.back{width:44px;height:44px;border-radius:50%;border:1px solid var(--border-glass);background:var(--bg-glass);color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none}
.scores{display:flex;gap:16px}.sc{text-align:center}.sc-l{font-size:0.65rem;color:var(--text2)}.sc-v{font-size:1.1rem;font-weight:700}.sc-v.best{background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ga{flex:1;position:relative;touch-action:manipulation;cursor:crosshair}canvas{display:block;width:100%;height:100%}
.overlay{position:fixed;inset:0;background:rgba(15,15,26,0.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;z-index:200;opacity:1;transition:opacity 0.4s}.overlay.hidden{opacity:0;pointer-events:none}
.ov-emoji{font-size:4rem;margin-bottom:16px;animation:bounceIn 0.5s}.ov-title{font-size:2.2rem;font-weight:800;margin-bottom:8px;text-align:center}.ov-sub{font-size:1rem;color:var(--text2);margin-bottom:24px;text-align:center}@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:300px;margin-bottom:24px}.si{text-align:center;padding:14px 8px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:12px}.sv{font-size:1.8rem;font-weight:700}.sl{font-size:0.7rem;color:var(--text2);margin-top:4px}
.nr{display:inline-flex;padding:4px 14px;border-radius:999px;font-size:0.8rem;font-weight:600;background:rgba(16,185,129,0.15);color:var(--success);margin-bottom:20px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 40px;border:none;border-radius:999px;font-family:var(--font);font-size:1.15rem;font-weight:600;cursor:pointer;transition:all 0.25s;touch-action:manipulation;min-width:220px}.btn:active{transform:scale(0.96)}.btn-primary{background:var(--accent-grad);color:white;box-shadow:0 0 20px var(--glow)}.btn-secondary{background:var(--bg-glass);color:var(--text);border:1px solid var(--border-glass)}.btn-group{display:flex;flex-direction:column;gap:12px;width:100%;max-width:260px}
.sound-btn{position:fixed;top:12px;right:12px;width:44px;height:44px;border-radius:50%;border:1px solid var(--border-glass);background:var(--bg-glass);color:var(--text);font-size:1.2rem;cursor:pointer;z-index:300;display:flex;align-items:center;justify-content:center}
</style></head><body><div class="bg-dec"></div>
<div class="overlay" id="startScr"><div class="ov-emoji">🎯</div><div class="ov-title">ຍິງເປົ້າ</div><div class="ov-sub">ແຕະເປົ້າ — ຍິ່ງໄວ ຍິ່ງໄດ້ຄະແນນ!</div>
<div class="sg" id="ss" style="display:none"><div class="si"><div class="sv" id="sBest">0</div><div class="sl">ຄະແນນສູງສຸດ</div></div><div class="si"><div class="sv" id="sPlays">0</div><div class="sl">ຫຼິ້ນແລ້ວ</div></div></div>
<div class="btn-group"><button class="btn btn-primary" onclick="startGame()">🎯 ເລີ່ມ</button><a href="../index.html" class="btn btn-secondary" style="text-decoration:none">🏠 ກັບໜ້າຫຼັກ</a></div></div>
<div class="overlay hidden" id="goScr"><div class="ov-emoji" id="ge">😢</div><div class="ov-title">ຈົບເກມ</div><div class="nr hidden" id="newRec">🏆 ສະຖິຕິໃໝ່!</div>
<div class="sg"><div class="si"><div class="sv" id="fScore">0</div><div class="sl">ຄະແນນ</div></div><div class="si"><div class="sv" id="fBest" style="background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">0</div><div class="sl">ດີທີ່ສຸດ</div></div><div class="si"><div class="sv" id="fHits">0</div><div class="sl">ແຕະຖືກ</div></div><div class="si"><div class="sv" id="fAcc">0%</div><div class="sl">ຄວາມແມ່ນ</div></div></div>
<div class="btn-group"><button class="btn btn-primary" onclick="startGame()">🔄 ລອງໃໝ່</button><a href="../index.html" class="btn btn-secondary" style="text-decoration:none">🏠 ກັບໜ້າຫຼັກ</a></div></div>
<div class="header" id="hdr" style="display:none"><a href="../index.html" class="back">←</a><div class="title"><span>🎯</span><span>ຍິງເປົ້າ</span></div><div class="scores"><div class="sc"><div class="sc-l">ຄະແນນ</div><div class="sc-v" id="scV">0</div></div><div class="sc"><div class="sc-l">❤️</div><div class="sc-v" id="livesV">3</div></div></div></div>
<div class="ga" id="gameArea" style="display:none"><canvas id="c"></canvas></div>
<button class="sound-btn" id="snd" onclick="sndOn=!sndOn;this.textContent=sndOn?'🔊':'🔇'">🔊</button>
<script>
const GID='target-shoot',cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H,targets,effects,score,hits,misses,lives,running,frame,spawnTimer,sndOn=true,ac=null;
function save(k,v){try{localStorage.setItem(`game_${GID}_${k}`,JSON.stringify(v))}catch(e){}}
function load(k,d=null){try{const r=localStorage.getItem(`game_${GID}_${k}`);return r!==null?JSON.parse(r):d}catch(e){return d}}
function initAudio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume()}
function playTone(f,d,t='sine',v=0.2){if(!sndOn||!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d/1000);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d/1000)}catch(e){}}
(function(){function u(){initAudio();document.removeEventListener('touchstart',u,true);document.removeEventListener('click',u,true)}document.addEventListener('touchstart',u,true);document.addEventListener('click',u,true)})();

function resize(){const ga=document.getElementById('gameArea'),r=ga.getBoundingClientRect(),dp=devicePixelRatio||1;W=r.width;H=r.height;cv.style.width=W+'px';cv.style.height=H+'px';cv.width=W*dp;cv.height=H*dp;cx.scale(dp,dp)}

function spawnTarget(){
  const r=15+Math.random()*20-Math.min(score*0.2,10);const margin=r+10;
  const x=margin+Math.random()*(W-2*margin),y=margin+Math.random()*(H-2*margin);
  const ttl=2000-Math.min(score*20,1200);// Time to live
  targets.push({x,y,r:Math.max(r,8),born:performance.now(),ttl,growing:true})
}

function tap(e){
  e.preventDefault();if(!running)return;
  const rect=cv.getBoundingClientRect();
  const x=(e.clientX||e.touches?.[0]?.clientX||0)-rect.left;
  const y=(e.clientY||e.touches?.[0]?.clientY||0)-rect.top;
  let hit=false;
  for(let i=targets.length-1;i>=0;i--){
    const t=targets[i];const dx=x-t.x,dy=y-t.y;
    if(dx*dx+dy*dy<=t.r*t.r){
      effects.push({x:t.x,y:t.y,r:t.r,alpha:1,type:'hit'});
      targets.splice(i,1);score++;hits++;document.getElementById('scV').textContent=score;
      playTone(600+Math.random()*200,60,'sine',0.2);if(navigator.vibrate)navigator.vibrate(10);hit=true;break
    }
  }
  if(!hit){misses++;effects.push({x,y,r:5,alpha:1,type:'miss'})}
}

cv.addEventListener('touchstart',tap,{passive:false});cv.addEventListener('click',tap);

function startGame(){
  document.querySelectorAll('.overlay').forEach(o=>o.classList.add('hidden'));
  document.getElementById('hdr').style.display='flex';document.getElementById('gameArea').style.display='flex';
  resize();score=0;hits=0;misses=0;lives=3;frame=0;spawnTimer=0;running=true;targets=[];effects=[];
  document.getElementById('scV').textContent='0';document.getElementById('livesV').textContent='3';
  spawnTarget();loop()
}

function loop(){
  cx.clearRect(0,0,W,H);frame++;spawnTimer++;
  // BG
  cx.fillStyle='#0f0f1a';cx.fillRect(0,0,W,H);
  // Spawn
  const interval=Math.max(15,50-Math.floor(score/2));
  if(spawnTimer>=interval&&targets.length<5){spawnTarget();spawnTimer=0}
  // Update targets
  const now=performance.now();
  for(let i=targets.length-1;i>=0;i--){
    const t=targets[i];const age=now-t.born;
    if(age>t.ttl){// Expired
      lives--;document.getElementById('livesV').textContent=lives;
      effects.push({x:t.x,y:t.y,r:t.r,alpha:1,type:'expire'});
      targets.splice(i,1);
      if(lives<=0){gameOver();return}
      continue
    }
    // Draw target
    const lifeRatio=1-age/t.ttl;
    // Outer ring
    cx.beginPath();cx.arc(t.x,t.y,t.r,0,Math.PI*2);cx.strokeStyle=`rgba(239,68,68,${0.3+lifeRatio*0.7})`;cx.lineWidth=3;cx.stroke();
    // Inner fill
    cx.beginPath();cx.arc(t.x,t.y,t.r*0.6,0,Math.PI*2);cx.fillStyle=`rgba(239,68,68,${0.2+lifeRatio*0.4})`;cx.fill();
    // Center dot
    cx.beginPath();cx.arc(t.x,t.y,3,0,Math.PI*2);cx.fillStyle='#EF4444';cx.fill();
    // Timer ring
    cx.beginPath();cx.arc(t.x,t.y,t.r+4,-Math.PI/2,-Math.PI/2+Math.PI*2*lifeRatio);cx.strokeStyle=lifeRatio>0.3?'rgba(34,197,94,0.5)':'rgba(239,68,68,0.8)';cx.lineWidth=2;cx.stroke()
  }
  // Effects
  for(let i=effects.length-1;i>=0;i--){
    const e=effects[i];e.alpha-=0.04;e.r+=2;
    if(e.alpha<=0){effects.splice(i,1);continue}
    cx.beginPath();cx.arc(e.x,e.y,e.r,0,Math.PI*2);
    cx.strokeStyle=e.type==='hit'?`rgba(34,197,94,${e.alpha})`:`rgba(239,68,68,${e.alpha})`;
    cx.lineWidth=2;cx.stroke()
  }
  if(running)requestAnimationFrame(loop)
}

function gameOver(){
  running=false;playTone(200,300,'sawtooth',0.2);if(navigator.vibrate)navigator.vibrate([100,50,100]);
  const isNew=score>load('hs',0);if(isNew)save('hs',score);save('tg',(load('tg',0)||0)+1);
  const total=hits+misses;const acc=total>0?Math.round(hits/total*100):0;
  setTimeout(()=>{
    document.getElementById('hdr').style.display='none';document.getElementById('gameArea').style.display='none';
    document.getElementById('ge').textContent=score>=30?'🏆':score>=15?'🎯':'😢';
    document.getElementById('fScore').textContent=score;document.getElementById('fBest').textContent=Math.max(score,load('hs',0));
    document.getElementById('fHits').textContent=hits;document.getElementById('fAcc').textContent=acc+'%';
    document.getElementById('newRec').classList.toggle('hidden',!isNew);document.getElementById('goScr').classList.remove('hidden')
  },500)
}
const hs=load('hs',0),tg=load('tg',0);if(tg>0){document.getElementById('ss').style.display='grid';document.getElementById('sBest').textContent=hs;document.getElementById('sPlays').textContent=tg}
</script></body></html>
