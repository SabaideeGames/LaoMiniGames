<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ລວມບລ໋ອກ 2048</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0f0f1a;--bg-glass:rgba(255,255,255,0.08);--border-glass:rgba(255,255,255,0.12);
      --text:#f0f0f5;--text2:#a0a0b8;--accent:#7C3AED;--accent2:#2563EB;
      --accent-grad:linear-gradient(135deg,#7C3AED,#2563EB);--glow:rgba(124,58,237,0.3);
      --success:#10B981;--font:'Noto Sans Lao','Phetsarath OT','Saysettha OT',system-ui,sans-serif;
    }
    body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;display:flex;flex-direction:column}
    .bg{position:fixed;inset:0;z-index:-1;pointer-events:none}
    .bg::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,0.08)0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(37,99,235,0.06)0%,transparent 50%)}

    /* Overlay */
    .overlay{position:fixed;inset:0;z-index:100;background:rgba(15,15,26,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;opacity:1;transition:opacity 0.4s}
    .overlay.hidden{opacity:0;pointer-events:none}
    .ov-emoji{font-size:3.5rem;margin-bottom:12px;animation:bounceIn 0.5s ease}
    @keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
    .ov-title{font-size:2.2rem;font-weight:800;text-align:center;margin-bottom:6px}
    .ov-sub{font-size:0.95rem;color:var(--text2);text-align:center;margin-bottom:28px;max-width:300px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 36px;border:none;border-radius:999px;font-family:var(--font);font-size:1.1rem;font-weight:600;cursor:pointer;transition:all 0.25s;touch-action:manipulation;min-width:200px}
    .btn:active{transform:scale(0.96)}
    .btn-primary{background:var(--accent-grad);color:white;box-shadow:0 0 20px var(--glow)}
    .btn-secondary{background:var(--bg-glass);color:var(--text);border:1px solid var(--border-glass)}
    .btn-group{display:flex;flex-direction:column;gap:12px;width:100%;max-width:260px;align-items:center}
    .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:300px;margin-bottom:24px}
    .stat-item{text-align:center;padding:14px 8px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:12px}
    .stat-value{font-size:1.8rem;font-weight:700}
    .stat-value.best{background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .stat-label{font-size:0.7rem;color:var(--text2);margin-top:4px}
    .new-record{display:inline-flex;gap:6px;padding:4px 14px;border-radius:999px;font-size:0.8rem;font-weight:600;background:rgba(16,185,129,0.15);color:var(--success);margin-bottom:16px}
    .new-record.hidden{display:none}

    /* Header */
    .game-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;z-index:10}
    @supports(padding:env(safe-area-inset-top)){.game-header{padding-top:calc(10px + env(safe-area-inset-top))}}
    .game-title{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
    .scores{display:flex;gap:12px}
    .score-box{text-align:center}
    .score-lbl{font-size:0.6rem;color:var(--text2)}
    .score-val{font-size:1.1rem;font-weight:700}
    .score-val.best{background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

    /* Grid */
    .grid-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:8px;touch-action:none}
    .grid-container{position:relative;border-radius:12px;background:rgba(255,255,255,0.04);padding:8px}
    .grid-bg{display:grid;gap:8px}
    .grid-bg-cell{border-radius:8px;background:rgba(255,255,255,0.06)}
    .tiles-layer{position:absolute;top:8px;left:8px;right:8px;bottom:8px}
    .tile{position:absolute;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;transition:top 0.12s ease,left 0.12s ease;z-index:1}
    .tile.merged{animation:tilePop 0.2s ease}
    .tile.new{animation:tileAppear 0.2s ease}
    @keyframes tilePop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
    @keyframes tileAppear{0%{opacity:0;transform:scale(0.5)}100%{opacity:1;transform:scale(1)}}

    /* Swipe hint */
    .swipe-hint{text-align:center;padding:8px;font-size:0.85rem;color:var(--text2);animation:hintPulse 2s infinite}
    @keyframes hintPulse{0%,100%{opacity:0.4}50%{opacity:0.8}}

    /* Sound */
    .sound-btn{position:fixed;top:12px;right:12px;z-index:200;width:40px;height:40px;padding:0;border-radius:50%;font-size:1.1rem;background:var(--bg-glass);color:var(--text);border:1px solid var(--border-glass);cursor:pointer;touch-action:manipulation}
    @supports(padding:env(safe-area-inset-top)){.sound-btn{top:calc(12px + env(safe-area-inset-top))}}

    .start-best{margin-top:20px;text-align:center}
    .start-best-lbl{font-size:0.7rem;color:var(--text2)}
    .start-best-val{font-size:1.3rem;font-weight:700;background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  </style>
</head>
<body>
  <div class="bg"></div>

  <!-- START -->
  <div class="overlay" id="startScreen">
    <div class="ov-emoji">🔢</div>
    <div class="ov-title">ລວມບລ໋ອກ 2048</div>
    <div class="ov-sub">ເລື່ອນເພື່ອລວມຕົວເລກ — ໄປໃຫ້ຮອດ 2048!</div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="startGame()">🎮 ເລີ່ມຫຼິ້ນ</button>
    </div>
    <div class="start-best">
      <div class="start-best-lbl">ຄະແນນສູງສຸດ</div>
      <div class="start-best-val" id="startBest">0</div>
    </div>
  </div>

  <!-- GAME OVER -->
  <div class="overlay hidden" id="overScreen">
    <div class="ov-emoji" id="overEmoji">😢</div>
    <div class="ov-title" id="overTitle">ຈົບເກມ</div>
    <div class="new-record hidden" id="newRecBadge">🏆 ສະຖິຕິໃໝ່!</div>
    <div class="stats-grid">
      <div class="stat-item"><div class="stat-value" id="fScore">0</div><div class="stat-label">ຄະແນນ</div></div>
      <div class="stat-item"><div class="stat-value best" id="fBest">0</div><div class="stat-label">ດີທີ່ສຸດ</div></div>
      <div class="stat-item"><div class="stat-value" id="fMax">0</div><div class="stat-label">ບລ໋ອກສູງສຸດ</div></div>
      <div class="stat-item"><div class="stat-value" id="fGames">0</div><div class="stat-label">ຫຼິ້ນແລ້ວ</div></div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="startGame()">🔄 ລອງໃໝ່</button>
      <button class="btn btn-secondary" onclick="showStart()">🏠 ໜ້າຫຼັກ</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="gameUI" style="display:none;flex-direction:column;height:100vh;height:100dvh">
    <div class="game-header">
      <div class="game-title"><span>🧩</span><span>2048</span></div>
      <div class="scores">
        <div class="score-box"><div class="score-lbl">ຄະແນນ</div><div class="score-val" id="scoreD">0</div></div>
        <div class="score-box"><div class="score-lbl">ດີທີ່ສຸດ</div><div class="score-val best" id="bestD">0</div></div>
      </div>
    </div>
    <div class="grid-wrapper" id="gridWrapper">
      <div class="grid-container" id="gridContainer">
        <div class="grid-bg" id="gridBg"></div>
        <div class="tiles-layer" id="tilesLayer"></div>
      </div>
    </div>
    <div class="swipe-hint" id="swipeHint">👆 ເລື່ອນຂຶ້ນ/ລົງ/ຊ້າຍ/ຂວາ</div>
  </div>

  <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>

  <script>
    const GID='merge-2048', SIZE=4;
    let grid,score,gameOn,tileId=0;

    // Storage
    function sv(k,v){try{localStorage.setItem(`game_${GID}_${k}`,JSON.stringify(v))}catch(e){}}
    function ld(k,d=null){try{const r=localStorage.getItem(`game_${GID}_${k}`);return r!==null?JSON.parse(r):d}catch(e){return d}}
    function getHS(){return ld('hs',0)}
    function updHS(s){const b=getHS();if(s>b){sv('hs',s);return true}return false}
    function incG(){const g=ld('tg',0)+1;sv('tg',g);return g}

    // Audio
    let aC=null,snd=true;
    function initA(){if(!aC)aC=new(window.AudioContext||window.webkitAudioContext)();if(aC.state==='suspended')aC.resume()}
    function tone(f,d,t='sine',v=0.15){if(!snd||!aC)return;try{const o=aC.createOscillator(),g=aC.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,aC.currentTime+d/1000);o.connect(g);g.connect(aC.destination);o.start();o.stop(aC.currentTime+d/1000)}catch(e){}}
    function toggleSound(){snd=!snd;document.getElementById('soundBtn').textContent=snd?'🔊':'🔇'}
    function vib(p){if(navigator.vibrate)navigator.vibrate(p)}
    // Mobile audio unlock
    (function(){function u(){initA();document.removeEventListener('touchstart',u,true);document.removeEventListener('touchend',u,true);document.removeEventListener('click',u,true)}document.addEventListener('touchstart',u,true);document.addEventListener('touchend',u,true);document.addEventListener('click',u,true)})()

    // Tile colors
    const TILE_COLORS={
      2:{bg:'#6366F1',text:'#fff',size:'1.5rem'},
      4:{bg:'#818CF8',text:'#fff',size:'1.5rem'},
      8:{bg:'#F97316',text:'#fff',size:'1.5rem'},
      16:{bg:'#FB923C',text:'#fff',size:'1.4rem'},
      32:{bg:'#EF4444',text:'#fff',size:'1.4rem'},
      64:{bg:'#DC2626',text:'#fff',size:'1.4rem'},
      128:{bg:'#F59E0B',text:'#fff',size:'1.2rem'},
      256:{bg:'#EAB308',text:'#fff',size:'1.2rem'},
      512:{bg:'#84CC16',text:'#fff',size:'1.2rem'},
      1024:{bg:'#22C55E',text:'#fff',size:'1rem'},
      2048:{bg:'#10B981',text:'#fff',size:'1rem'},
      4096:{bg:'#0EA5E9',text:'#fff',size:'0.9rem'},
      8192:{bg:'#7C3AED',text:'#fff',size:'0.9rem'},
    };
    function getTileStyle(v){return TILE_COLORS[v]||{bg:'#7C3AED',text:'#fff',size:'0.8rem'}}

    // Build grid UI
    function buildUI(){
      const wrap=document.getElementById('gridWrapper');
      const rect=wrap.getBoundingClientRect();
      const s=Math.min(rect.width-24,rect.height-24,400);
      const cont=document.getElementById('gridContainer');
      cont.style.width=s+'px';cont.style.height=s+'px';
      const gap=8,pad=8;
      const cellSize=(s-pad*2-gap*(SIZE-1))/SIZE;
      const bg=document.getElementById('gridBg');
      bg.style.gridTemplateColumns=`repeat(${SIZE},${cellSize}px)`;
      bg.style.gridTemplateRows=`repeat(${SIZE},${cellSize}px)`;
      bg.innerHTML='';
      for(let i=0;i<SIZE*SIZE;i++){const d=document.createElement('div');d.className='grid-bg-cell';bg.appendChild(d)}
      return{cellSize,gap,pad};
    }

    let cellSize,gap,pad;

    function cellPos(r,c){
      return{
        left:pad+c*(cellSize+gap),
        top:pad+r*(cellSize+gap)
      }
    }

    // Tile management
    let tiles=[];
    function createTileEl(tile){
      const el=document.createElement('div');
      el.className='tile new';
      el.id='tile-'+tile.id;
      const p=cellPos(tile.r,tile.c);
      const st=getTileStyle(tile.v);
      el.style.cssText=`left:${p.left}px;top:${p.top}px;width:${cellSize}px;height:${cellSize}px;background:${st.bg};color:${st.text};font-size:${st.size};`;
      el.textContent=tile.v;
      document.getElementById('tilesLayer').appendChild(el);
      setTimeout(()=>el.classList.remove('new'),200);
      return el;
    }

    function updateTileEl(tile){
      const el=document.getElementById('tile-'+tile.id);
      if(!el)return;
      const p=cellPos(tile.r,tile.c);
      const st=getTileStyle(tile.v);
      el.style.left=p.left+'px';el.style.top=p.top+'px';
      el.style.background=st.bg;el.style.color=st.text;el.style.fontSize=st.size;
      el.textContent=tile.v;
    }

    function removeTileEl(id){
      const el=document.getElementById('tile-'+id);
      if(el)el.remove();
    }

    function animateMerge(tile){
      const el=document.getElementById('tile-'+tile.id);
      if(el){el.classList.remove('merged');void el.offsetWidth;el.classList.add('merged')}
    }

    // Grid ops
    function emptyGrid(){
      grid=[];
      for(let r=0;r<SIZE;r++){grid[r]=[];for(let c=0;c<SIZE;c++)grid[r][c]=null}
    }

    function addRandom(){
      const empty=[];
      for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(!grid[r][c])empty.push({r,c});
      if(!empty.length)return null;
      const p=empty[Math.floor(Math.random()*empty.length)];
      const v=Math.random()<0.9?2:4;
      const t={id:tileId++,r:p.r,c:p.c,v};
      grid[p.r][p.c]=t;tiles.push(t);
      createTileEl(t);
      return t;
    }

    function move(dir){
      if(!gameOn)return;
      let moved=false;
      const mergedIds=new Set();

      // Get traversal order
      let rows=[],cols=[];
      for(let i=0;i<SIZE;i++){rows.push(i);cols.push(i)}

      if(dir==='down')rows.reverse();
      if(dir==='right')cols.reverse();

      const dr=dir==='up'?-1:dir==='down'?1:0;
      const dc=dir==='left'?-1:dir==='right'?1:0;

      for(const r of rows){
        for(const c of cols){
          const tile=grid[r][c];
          if(!tile)continue;
          let nr=r,nc=c;
          while(true){
            const nextr=nr+dr,nextc=nc+dc;
            if(nextr<0||nextr>=SIZE||nextc<0||nextc>=SIZE)break;
            const target=grid[nextr][nextc];
            if(!target){nr=nextr;nc=nextc;continue}
            if(target.v===tile.v&&!mergedIds.has(target.id)){
              // Merge
              grid[r][c]=null;
              grid[nr][nc]=null;
              grid[nextr][nextc]=tile;
              tile.r=nextr;tile.c=nextc;tile.v*=2;
              score+=tile.v;
              mergedIds.add(tile.id);
              // Remove absorbed tile
              tiles=tiles.filter(t=>t.id!==target.id);
              removeTileEl(target.id);
              updateTileEl(tile);
              animateMerge(tile);
              moved=true;
              break;
            }
            break;
          }
          if(tile.r!==nr||tile.c!==nc){
            grid[r][c]=null;
            grid[nr][nc]=tile;
            tile.r=nr;tile.c=nc;
            updateTileEl(tile);
            moved=true;
          }
        }
      }

      if(moved){
        document.getElementById('scoreD').textContent=score;
        document.getElementById('swipeHint').style.display='none';
        tone(300+score*0.5,60,'sine',0.12);
        vib(20);

        setTimeout(()=>{
          addRandom();
          if(isGameOver()){
            gameOn=false;
            setTimeout(gameOver,300);
          }
        },130);
      }
    }

    function isGameOver(){
      for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
        if(!grid[r][c])return false;
        const v=grid[r][c].v;
        if(r>0&&grid[r-1][c]&&grid[r-1][c].v===v)return false;
        if(c>0&&grid[r][c-1]&&grid[r][c-1].v===v)return false;
      }
      return true;
    }

    function getMaxTile(){
      let max=0;
      for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(grid[r][c])max=Math.max(max,grid[r][c].v);
      return max;
    }

    function gameOver(){
      tone(200,300,'sawtooth',0.12);vib([100,30,100]);
      const isNew=updHS(score);
      const tg=incG();
      document.getElementById('fScore').textContent=score;
      document.getElementById('fBest').textContent=getHS();
      document.getElementById('fMax').textContent=getMaxTile();
      document.getElementById('fGames').textContent=tg;
      const b=document.getElementById('newRecBadge'),e=document.getElementById('overEmoji'),t=document.getElementById('overTitle');
      if(getMaxTile()>=2048){e.textContent='🎉';t.textContent='ຊະນະ! 🏆'}
      else if(isNew&&score>0){b.classList.remove('hidden');e.textContent='🏆';t.textContent='ສະຖິຕິໃໝ່!'}
      else{b.classList.add('hidden');e.textContent='😢';t.textContent='ຈົບເກມ'}
      document.getElementById('overScreen').classList.remove('hidden');
    }

    // Game control
    function startGame(){
      initA();score=0;tileId=0;tiles=[];gameOn=true;
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('overScreen').classList.add('hidden');
      document.getElementById('gameUI').style.display='flex';
      document.getElementById('scoreD').textContent='0';
      document.getElementById('bestD').textContent=getHS();
      document.getElementById('swipeHint').style.display='';
      const dims=buildUI();cellSize=dims.cellSize;gap=dims.gap;pad=dims.pad;
      document.getElementById('tilesLayer').innerHTML='';
      emptyGrid();addRandom();addRandom();
    }

    function showStart(){
      document.getElementById('startScreen').classList.remove('hidden');
      document.getElementById('overScreen').classList.add('hidden');
      document.getElementById('gameUI').style.display='none';
      document.getElementById('startBest').textContent=getHS();
    }

    // Swipe detection
    let sx=0,sy=0,swiping=false;
    const gw=document.getElementById('gridWrapper');
    gw.addEventListener('touchstart',e=>{e.preventDefault();sx=e.touches[0].clientX;sy=e.touches[0].clientY;swiping=true},{passive:false});
    gw.addEventListener('touchmove',e=>{e.preventDefault()},{passive:false});
    gw.addEventListener('touchend',e=>{
      if(!swiping)return;swiping=false;
      const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
      const adx=Math.abs(dx),ady=Math.abs(dy);
      if(Math.max(adx,ady)<30)return;
      if(adx>ady)move(dx>0?'right':'left');
      else move(dy>0?'down':'up');
    });

    // Keyboard
    document.addEventListener('keydown',e=>{
      if(!gameOn)return;
      if(e.key==='ArrowUp')move('up');
      else if(e.key==='ArrowDown')move('down');
      else if(e.key==='ArrowLeft')move('left');
      else if(e.key==='ArrowRight')move('right');
    });

    // Resize
    window.addEventListener('resize',()=>{if(gameOn){const d=buildUI();cellSize=d.cellSize;gap=d.gap;pad=d.pad;tiles.forEach(t=>updateTileEl(t))}});

    // Init
    document.getElementById('startBest').textContent=getHS();
  </script>
</body>
</html>
