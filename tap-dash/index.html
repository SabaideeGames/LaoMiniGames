<!DOCTYPE html>
<html lang="lo"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>ແລ່ນໂຕນ — Tap Dash</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0f1a;--bg-glass:rgba(255,255,255,0.08);--border-glass:rgba(255,255,255,0.12);--text:#f0f0f5;--text2:#a0a0b8;--accent:#7C3AED;--accent-grad:linear-gradient(135deg,#7C3AED,#2563EB);--glow:rgba(124,58,237,0.3);--success:#10b981;--danger:#ef4444;--font:'Noto Sans Lao','Phetsarath OT',system-ui,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow:hidden;overscroll-behavior:none;user-select:none;-webkit-user-select:none;display:flex;flex-direction:column}
.bg-dec{position:fixed;inset:0;z-index:-1;pointer-events:none}.bg-dec::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,0.08)0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(37,99,235,0.06)0%,transparent 50%)}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;z-index:10}
@supports(padding:env(safe-area-inset-top)){.header{padding-top:calc(12px + env(safe-area-inset-top))}}
.title{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.back{width:44px;height:44px;border-radius:50%;border:1px solid var(--border-glass);background:var(--bg-glass);color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none}
.scores{display:flex;gap:16px}.sc{text-align:center}.sc-l{font-size:0.65rem;color:var(--text2)}.sc-v{font-size:1.1rem;font-weight:700}.sc-v.best{background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ga{flex:1;display:flex;align-items:center;justify-content:center;touch-action:manipulation;cursor:pointer}canvas{display:block;max-width:100%;border-radius:12px}
.overlay{position:fixed;inset:0;background:rgba(15,15,26,0.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;z-index:200;opacity:1;transition:opacity 0.4s}.overlay.hidden{opacity:0;pointer-events:none}
.ov-emoji{font-size:4rem;margin-bottom:16px;animation:bounceIn 0.5s}.ov-title{font-size:2.2rem;font-weight:800;margin-bottom:8px;text-align:center}.ov-sub{font-size:1rem;color:var(--text2);margin-bottom:24px;text-align:center}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:300px;margin-bottom:24px}.si{text-align:center;padding:14px 8px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:12px}.sv{font-size:1.8rem;font-weight:700}.sl{font-size:0.7rem;color:var(--text2);margin-top:4px}
.nr{display:inline-flex;padding:4px 14px;border-radius:999px;font-size:0.8rem;font-weight:600;background:rgba(16,185,129,0.15);color:var(--success);margin-bottom:20px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 40px;border:none;border-radius:999px;font-family:var(--font);font-size:1.15rem;font-weight:600;cursor:pointer;transition:all 0.25s;touch-action:manipulation;min-width:220px}.btn:active{transform:scale(0.96)}.btn-primary{background:var(--accent-grad);color:white;box-shadow:0 0 20px var(--glow)}.btn-secondary{background:var(--bg-glass);color:var(--text);border:1px solid var(--border-glass)}.btn-group{display:flex;flex-direction:column;gap:12px;width:100%;max-width:260px}
.sound-btn{position:fixed;top:12px;right:12px;width:44px;height:44px;border-radius:50%;border:1px solid var(--border-glass);background:var(--bg-glass);color:var(--text);font-size:1.2rem;cursor:pointer;z-index:300;display:flex;align-items:center;justify-content:center}
</style></head>
<body><div class="bg-dec"></div>
<div class="overlay" id="startScr"><div class="ov-emoji">🏃</div><div class="ov-title">ແລ່ນໂຕນ</div><div class="ov-sub">ແຕະເພື່ອໂຕນ — ຫຼີກລ້ຽງສິ່ງກີດຂວາງ!</div>
<div class="sg" id="ss" style="display:none"><div class="si"><div class="sv" id="sBest">0</div><div class="sl">ຄະແນນສູງສຸດ</div></div><div class="si"><div class="sv" id="sPlays">0</div><div class="sl">ຫຼິ້ນແລ້ວ</div></div></div>
<div class="btn-group"><button class="btn btn-primary" onclick="startGame()">🏃 ເລີ່ມ</button><a href="../index.html" class="btn btn-secondary" style="text-decoration:none">🏠 ກັບໜ້າຫຼັກ</a></div></div>
<div class="overlay hidden" id="goScr"><div class="ov-emoji" id="ge">😢</div><div class="ov-title">ຈົບເກມ</div><div class="nr hidden" id="newRec">🏆 ສະຖິຕິໃໝ່!</div>
<div class="sg"><div class="si"><div class="sv" id="fScore">0</div><div class="sl">ຄະແນນ</div></div><div class="si"><div class="sv" id="fBest" style="background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">0</div><div class="sl">ດີທີ່ສຸດ</div></div><div class="si"><div class="sv" id="fCoins">0</div><div class="sl">🪙 ເກັບ</div></div><div class="si"><div class="sv" id="fDist">0m</div><div class="sl">ໄລຍະ</div></div></div>
<div class="btn-group"><button class="btn btn-primary" onclick="startGame()">🔄 ລອງໃໝ່</button><a href="../index.html" class="btn btn-secondary" style="text-decoration:none">🏠 ກັບໜ້າຫຼັກ</a></div></div>
<div class="header" id="hdr" style="display:none"><a href="../index.html" class="back">←</a><div class="title"><span>🏃</span><span>ແລ່ນໂຕນ</span></div><div class="scores"><div class="sc"><div class="sc-l">ຄະແນນ</div><div class="sc-v" id="scV">0</div></div><div class="sc"><div class="sc-l">🪙</div><div class="sc-v" id="coinV">0</div></div></div></div>
<div class="ga" id="gameArea" style="display:none" onclick="jump()"><canvas id="c"></canvas></div>
<button class="sound-btn" id="snd" onclick="sndOn=!sndOn;this.textContent=sndOn?'🔊':'🔇'">🔊</button>
<script>
const GID='tap-dash',cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H,player,obstacles,coins,score,coinCount,dist,speed,running,frame,groundY,sndOn=true,ac=null;
function save(k,v){try{localStorage.setItem(`game_${GID}_${k}`,JSON.stringify(v))}catch(e){}}
function load(k,d=null){try{const r=localStorage.getItem(`game_${GID}_${k}`);return r!==null?JSON.parse(r):d}catch(e){return d}}
function initAudio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume()}
function playTone(f,d,t='sine',v=0.2){if(!sndOn||!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d/1000);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d/1000)}catch(e){}}
(function(){function u(){initAudio();document.removeEventListener('touchstart',u,true);document.removeEventListener('click',u,true)}document.addEventListener('touchstart',u,true);document.addEventListener('click',u,true)})();
function resize(){const a=document.getElementById('gameArea'),r=a.getBoundingClientRect(),dp=devicePixelRatio||1;W=Math.min(r.width-16,420);H=Math.min(r.height-16,700);cv.style.width=W+'px';cv.style.height=H+'px';cv.width=W*dp;cv.height=H*dp;cx.scale(dp,dp);groundY=H-60}
function jump(){if(!running)return;if(player.onGround){player.vy=-12;player.onGround=false;playTone(400,50,'sine',0.15)}}
function startGame(){
  document.querySelectorAll('.overlay').forEach(o=>o.classList.add('hidden'));
  document.getElementById('hdr').style.display='flex';document.getElementById('gameArea').style.display='flex';
  resize();score=0;coinCount=0;dist=0;speed=4;frame=0;running=true;
  player={x:60,y:groundY-30,vy:0,w:24,h:30,onGround:true};obstacles=[];coins=[];
  document.getElementById('scV').textContent='0';document.getElementById('coinV').textContent='0';
  loop()
}
function loop(){
  cx.clearRect(0,0,W,H);frame++;dist+=speed;
  // BG
  cx.fillStyle='#0f0f1a';cx.fillRect(0,0,W,H);
  // Stars
  for(let i=0;i<8;i++){const sx=(frame*0.3+i*53)%W;const sy=(i*97+23)%groundY;cx.fillStyle=`rgba(255,255,255,${0.15+Math.sin(frame*0.02+i)*0.1})`;cx.fillRect(sx,sy,1.5,1.5)}
  // Ground
  cx.fillStyle='rgba(255,255,255,0.05)';cx.fillRect(0,groundY,W,H-groundY);
  cx.fillStyle='rgba(124,58,237,0.2)';cx.fillRect(0,groundY,W,2);
  // Speed up
  speed=4+Math.min(dist/500,6);
  // Spawn obstacles
  if(frame%Math.max(40,70-Math.floor(dist/200))===0){
    const h=20+Math.random()*30;const w=15+Math.random()*15;
    obstacles.push({x:W+20,y:groundY-h,w,h,color:['#EF4444','#F97316','#8B5CF6'][Math.floor(Math.random()*3)]})
  }
  // Spawn coins
  if(frame%60===0){coins.push({x:W+20,y:groundY-60-Math.random()*80,r:8})}
  // Physics
  player.vy+=0.6;player.y+=player.vy;
  if(player.y>=groundY-player.h){player.y=groundY-player.h;player.vy=0;player.onGround=true}
  // Update obstacles
  for(let i=obstacles.length-1;i>=0;i--){
    obstacles[i].x-=speed;
    if(obstacles[i].x<-50){obstacles.splice(i,1);score++;document.getElementById('scV').textContent=score;continue}
    // Collision
    const o=obstacles[i];
    if(player.x+player.w>o.x&&player.x<o.x+o.w&&player.y+player.h>o.y&&player.y<o.y+o.h){gameOver();return}
  }
  // Update coins
  for(let i=coins.length-1;i>=0;i--){
    coins[i].x-=speed;
    if(coins[i].x<-20){coins.splice(i,1);continue}
    const c=coins[i];const dx=player.x+player.w/2-c.x,dy=player.y+player.h/2-c.y;
    if(Math.sqrt(dx*dx+dy*dy)<20){coins.splice(i,1);coinCount++;document.getElementById('coinV').textContent=coinCount;playTone(880,60,'sine',0.2)}
  }
  // Draw obstacles
  obstacles.forEach(o=>{cx.fillStyle=o.color;cx.beginPath();cx.roundRect(o.x,o.y,o.w,o.h,4);cx.fill()});
  // Draw coins
  coins.forEach(c=>{cx.beginPath();cx.arc(c.x,c.y,c.r,0,Math.PI*2);cx.fillStyle='#FBBF24';cx.fill();cx.strokeStyle='#D97706';cx.lineWidth=2;cx.stroke()});
  // Draw player
  cx.fillStyle='#7C3AED';cx.beginPath();cx.roundRect(player.x,player.y,player.w,player.h,6);cx.fill();
  cx.fillStyle='white';cx.beginPath();cx.arc(player.x+17,player.y+10,3,0,Math.PI*2);cx.fill();
  cx.fillStyle='#0f0f1a';cx.beginPath();cx.arc(player.x+18,player.y+10,1.5,0,Math.PI*2);cx.fill();
  // Dist display
  cx.fillStyle='rgba(255,255,255,0.08)';cx.font='bold 48px system-ui';cx.textAlign='center';cx.fillText(Math.floor(dist/10)+'m',W/2,80);
  if(running)requestAnimationFrame(loop)
}
function gameOver(){
  running=false;playTone(200,300,'sawtooth',0.2);if(navigator.vibrate)navigator.vibrate([100,50,100]);
  const s=score;const isNew=s>load('hs',0);if(isNew)save('hs',s);const p=load('tg',0)+1;save('tg',p);
  document.getElementById('hdr').style.display='none';document.getElementById('gameArea').style.display='none';
  document.getElementById('ge').textContent=s>=30?'🏆':s>=15?'🏃':'😢';document.getElementById('fScore').textContent=s;
  document.getElementById('fBest').textContent=Math.max(s,load('hs',0));document.getElementById('fCoins').textContent=coinCount;
  document.getElementById('fDist').textContent=Math.floor(dist/10)+'m';document.getElementById('newRec').classList.toggle('hidden',!isNew);
  document.getElementById('goScr').classList.remove('hidden')
}
const hs=load('hs',0),tg=load('tg',0);if(tg>0){document.getElementById('ss').style.display='grid';document.getElementById('sBest').textContent=hs;document.getElementById('sPlays').textContent=tg}
</script></body></html>
