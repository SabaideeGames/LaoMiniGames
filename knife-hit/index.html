<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ປາດາວ — Knife Hit</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
    :root{--bg:#0f0f1a;--bg-glass:rgba(255,255,255,0.08);--border-glass:rgba(255,255,255,0.12);--text:#f0f0f5;--text2:#a0a0b8;--text3:#6b6b80;--accent:#7C3AED;--accent2:#2563EB;--accent-grad:linear-gradient(135deg,#7C3AED,#2563EB);--glow:rgba(124,58,237,0.3);--success:#10b981;--danger:#ef4444;--font:'Noto Sans Lao','Phetsarath OT','Saysettha OT',system-ui,sans-serif}
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;display:flex;flex-direction:column}
    .bg-dec{position:fixed;inset:0;z-index:-1;pointer-events:none}
    .bg-dec::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,0.08)0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(37,99,235,0.06)0%,transparent 50%)}
    .game-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;z-index:10}
    @supports(padding:env(safe-area-inset-top)){.game-header{padding-top:calc(12px + env(safe-area-inset-top))}}
    .game-title{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
    .back-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--border-glass);background:var(--bg-glass);color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none}
    .header-scores{display:flex;gap:16px}.header-score{text-align:center}.header-score-label{font-size:0.65rem;color:var(--text2)}.header-score-value{font-size:1.1rem;font-weight:700}.header-score-value.best{background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .game-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;touch-action:manipulation;cursor:pointer}
    canvas{display:block;max-width:100%}
    .stage-popup{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-size:2rem;font-weight:800;color:var(--success);opacity:0;pointer-events:none;z-index:50;text-shadow:0 0 20px rgba(16,185,129,0.5)}
    .stage-popup.show{animation:stageAnim 1s ease-out forwards}
    @keyframes stageAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-60%) scale(1)}}
    .overlay{position:fixed;inset:0;background:rgba(15,15,26,0.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;z-index:200;opacity:1;transition:opacity 0.4s}
    .overlay.hidden{opacity:0;pointer-events:none}
    .overlay-emoji{font-size:4rem;margin-bottom:16px;animation:bounceIn 0.5s ease}
    .overlay-title{font-size:2.2rem;font-weight:800;margin-bottom:8px;text-align:center}
    .overlay-sub{font-size:1rem;color:var(--text2);margin-bottom:24px;text-align:center}
    @keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
    .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:300px;margin-bottom:24px}
    .stat-item{text-align:center;padding:14px 8px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:12px}
    .stat-value{font-size:1.8rem;font-weight:700;line-height:1.2}.stat-label{font-size:0.7rem;color:var(--text2);margin-top:4px}
    .new-record{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:999px;font-size:0.8rem;font-weight:600;background:rgba(16,185,129,0.15);color:var(--success);margin-bottom:20px;animation:scaleIn 0.4s ease 0.3s both}
    @keyframes scaleIn{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 40px;border:none;border-radius:999px;font-family:var(--font);font-size:1.15rem;font-weight:600;cursor:pointer;transition:all 0.25s;touch-action:manipulation;min-width:220px}
    .btn:active{transform:scale(0.96)}
    .btn-primary{background:var(--accent-grad);color:white;box-shadow:0 0 20px var(--glow)}
    .btn-secondary{background:var(--bg-glass);color:var(--text);border:1px solid var(--border-glass)}
    .btn-group{display:flex;flex-direction:column;gap:12px;width:100%;max-width:260px}
    .knives-left{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:10}
    .knife-dot{width:8px;height:24px;border-radius:4px;background:var(--accent);transition:opacity 0.2s}
    .knife-dot.used{opacity:0.2}
    .sound-btn{position:fixed;top:12px;right:12px;width:44px;height:44px;border-radius:50%;border:1px solid var(--border-glass);background:var(--bg-glass);color:var(--text);font-size:1.2rem;cursor:pointer;z-index:300;display:flex;align-items:center;justify-content:center}
    @supports(padding:env(safe-area-inset-top)){.sound-btn{top:calc(12px + env(safe-area-inset-top))}}
  </style>
</head>
<body>
  <div class="bg-dec"></div>
  <div class="overlay" id="startScreen">
    <div class="overlay-emoji">🔪</div>
    <div class="overlay-title">ປາດາວ</div>
    <div class="overlay-sub">ແຕະເພື່ອຂວ້າງມີດ — ຢ່າໃຫ້ຊົນກັນ!</div>
    <div class="stats-grid" id="startStats" style="display:none">
      <div class="stat-item"><div class="stat-value" id="startBest">0</div><div class="stat-label">ດ່ານສູງສຸດ</div></div>
      <div class="stat-item"><div class="stat-value" id="startPlays">0</div><div class="stat-label">ຫຼິ້ນແລ້ວ</div></div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="startGame()">🔪 ເລີ່ມຫຼິ້ນ</button>
      <a href="../index.html" class="btn btn-secondary" style="text-decoration:none">🏠 ກັບໜ້າຫຼັກ</a>
    </div>
  </div>
  <div class="overlay hidden" id="gameOverScreen">
    <div class="overlay-emoji" id="goEmoji">😢</div>
    <div class="overlay-title">ຈົບເກມ</div>
    <div class="new-record hidden" id="newRecord">🏆 ສະຖິຕິໃໝ່!</div>
    <div class="stats-grid">
      <div class="stat-item"><div class="stat-value" id="finalStage">0</div><div class="stat-label">ດ່ານ</div></div>
      <div class="stat-item"><div class="stat-value best" id="finalBest" style="background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">0</div><div class="stat-label">ດ່ານສູງສຸດ</div></div>
      <div class="stat-item"><div class="stat-value" id="finalKnives">0</div><div class="stat-label">ມີດຂວ້າງ</div></div>
      <div class="stat-item"><div class="stat-value" id="finalApples">0</div><div class="stat-label">🍎 ເກັບໄດ້</div></div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="startGame()">🔄 ລອງໃໝ່</button>
      <a href="../index.html" class="btn btn-secondary" style="text-decoration:none">🏠 ກັບໜ້າຫຼັກ</a>
    </div>
  </div>
  <div class="game-header" id="gameHeader" style="display:none">
    <a href="../index.html" class="back-btn">←</a>
    <div class="game-title"><span>🔪</span><span>ດ່ານ <span id="stageNum">1</span></span></div>
    <div class="header-scores">
      <div class="header-score"><div class="header-score-label">🍎</div><div class="header-score-value" id="appleCount">0</div></div>
      <div class="header-score"><div class="header-score-label">ດີທີ່ສຸດ</div><div class="header-score-value best" id="bestStage">0</div></div>
    </div>
  </div>
  <div class="game-area" id="gameArea" style="display:none" onclick="throwKnife()">
    <canvas id="c"></canvas>
  </div>
  <div class="knives-left" id="knivesLeft" style="display:none"></div>
  <div class="stage-popup" id="stagePopup">ດ່ານ 2 🎉</div>
  <button class="sound-btn" id="soundBtn" onclick="event.stopPropagation();toggleSound()">🔊</button>

  <script>
    const GAME_ID='knife-hit';
    const canvas=document.getElementById('c');
    const ctx=canvas.getContext('2d');
    let W,H,dpr;
    let gameRunning=false,stage=1,knivesTotal=5,knivesThrown=0,totalKnivesThrown=0,applesCollected=0;
    let logAngle=0,logSpeed=0.02,logDir=1,logRadius=60;
    let stuckKnives=[],flyingKnife=null,apples=[];
    let soundEnabled=true,audioCtx=null;

    function save(k,v){try{localStorage.setItem(`game_${GAME_ID}_${k}`,JSON.stringify(v))}catch(e){}}
    function load(k,d=null){try{const r=localStorage.getItem(`game_${GAME_ID}_${k}`);return r!==null?JSON.parse(r):d}catch(e){return d}}
    function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}
    function playTone(f,d,t='sine',v=0.2){if(!soundEnabled||!audioCtx)return;if(audioCtx.state==='suspended'){audioCtx.resume().then(()=>playTone(f,d,t,v));return;}try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d/1000);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d/1000)}catch(e){}}
    (function(){function u(){initAudio();document.removeEventListener('touchstart',u,true);document.removeEventListener('touchend',u,true);document.removeEventListener('click',u,true)}document.addEventListener('touchstart',u,true);document.addEventListener('touchend',u,true);document.addEventListener('click',u,true)})();
    function toggleSound(){soundEnabled=!soundEnabled;document.getElementById('soundBtn').textContent=soundEnabled?'🔊':'🔇'}

    function resize(){
      const area=document.getElementById('gameArea');
      const rect=area.getBoundingClientRect();
      dpr=window.devicePixelRatio||1;
      W=Math.min(rect.width,420);H=Math.min(rect.height,700);
      canvas.style.width=W+'px';canvas.style.height=H+'px';
      canvas.width=W*dpr;canvas.height=H*dpr;
      ctx.scale(dpr,dpr);
      logRadius=Math.min(W,H)*0.13;
    }

    function setupStage(){
      knivesTotal=5+Math.floor(stage/3);
      knivesThrown=0;
      stuckKnives=[];
      flyingKnife=null;
      // Pre-stuck knives (obstacles) increase with stage
      const preStuck=Math.min(Math.floor(stage/2),6);
      for(let i=0;i<preStuck;i++){
        stuckKnives.push({angle:(Math.PI*2/preStuck)*i,isObstacle:true});
      }
      // Apples
      apples=[];
      if(Math.random()<0.5+stage*0.03){
        let aAngle=Math.random()*Math.PI*2;
        apples.push({angle:aAngle,collected:false});
      }
      // Speed variation
      logSpeed=0.015+Math.min(stage*0.003,0.04);
      if(stage%5===0){logDir=Math.random()<0.5?1:-1}// Boss-like direction change
      renderKnivesDots();
    }

    function renderKnivesDots(){
      const container=document.getElementById('knivesLeft');
      container.innerHTML='';
      for(let i=0;i<knivesTotal;i++){
        const dot=document.createElement('div');
        dot.className='knife-dot'+(i<knivesThrown?' used':'');
        container.appendChild(dot);
      }
    }

    function throwKnife(){
      if(!gameRunning||flyingKnife)return;
      flyingKnife={y:H-60,speed:12};
      playTone(400,60,'triangle',0.2);
    }

    function checkCollision(angle){
      for(const k of stuckKnives){
        let diff=Math.abs(angle-k.angle)%(Math.PI*2);
        if(diff>Math.PI)diff=Math.PI*2-diff;
        if(diff<0.2)return true;
      }
      return false;
    }

    function gameLoop(){
      ctx.clearRect(0,0,W,H);
      const cx=W/2,cy=H*0.32;

      // Rotate log
      logAngle+=logSpeed*logDir;
      // Boss: reverse direction randomly
      if(stage%5===0&&Math.random()<0.005)logDir*=-1;

      // Draw log (circle)
      ctx.save();
      ctx.translate(cx,cy);
      ctx.beginPath();ctx.arc(0,0,logRadius,0,Math.PI*2);
      ctx.fillStyle='#8B4513';ctx.fill();
      ctx.strokeStyle='#A0522D';ctx.lineWidth=3;ctx.stroke();
      // Wood rings
      ctx.beginPath();ctx.arc(0,0,logRadius*0.6,0,Math.PI*2);ctx.strokeStyle='rgba(160,82,45,0.4)';ctx.lineWidth=1;ctx.stroke();
      ctx.beginPath();ctx.arc(0,0,logRadius*0.3,0,Math.PI*2);ctx.stroke();

      // Draw apples
      apples.forEach(a=>{
        if(a.collected)return;
        const ax=Math.cos(a.angle+logAngle)*(logRadius+25);
        const ay=Math.sin(a.angle+logAngle)*(logRadius+25);
        ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('🍎',ax,ay);
      });

      // Draw stuck knives
      stuckKnives.forEach(k=>{
        const kx=Math.cos(k.angle+logAngle)*(logRadius+2);
        const ky=Math.sin(k.angle+logAngle)*(logRadius+2);
        const ex=Math.cos(k.angle+logAngle)*(logRadius+35);
        const ey=Math.sin(k.angle+logAngle)*(logRadius+35);
        ctx.beginPath();ctx.moveTo(kx,ky);ctx.lineTo(ex,ey);
        ctx.strokeStyle=k.isObstacle?'#6b7280':'#e2e8f0';ctx.lineWidth=3;ctx.lineCap='round';ctx.stroke();
        // Knife handle
        const hx=Math.cos(k.angle+logAngle)*(logRadius+35);
        const hy=Math.sin(k.angle+logAngle)*(logRadius+35);
        ctx.beginPath();ctx.arc(hx,hy,4,0,Math.PI*2);
        ctx.fillStyle=k.isObstacle?'#6b7280':'#e2e8f0';ctx.fill();
      });
      ctx.restore();

      // Flying knife
      if(flyingKnife){
        flyingKnife.y-=flyingKnife.speed;
        const knifeX=cx;
        const knifeY=flyingKnife.y;
        // Draw flying knife
        ctx.save();
        ctx.beginPath();ctx.moveTo(knifeX,knifeY);ctx.lineTo(knifeX,knifeY+30);
        ctx.strokeStyle='#e2e8f0';ctx.lineWidth=3;ctx.lineCap='round';ctx.stroke();
        ctx.beginPath();ctx.arc(knifeX,knifeY+30,4,0,Math.PI*2);
        ctx.fillStyle='#e2e8f0';ctx.fill();
        // Blade tip
        ctx.beginPath();ctx.moveTo(knifeX-4,knifeY);ctx.lineTo(knifeX,knifeY-8);ctx.lineTo(knifeX+4,knifeY);
        ctx.fillStyle='#c0c0c0';ctx.fill();
        ctx.restore();

        // Check if knife reached log
        const dist=Math.sqrt((knifeX-cx)**2+(knifeY-cy)**2);
        if(dist<=logRadius+35){
          const angle=Math.atan2(knifeY-cy,knifeX-cx)-logAngle;
          // Check apple collection
          apples.forEach(a=>{
            if(a.collected)return;
            let diff=Math.abs(angle-a.angle)%(Math.PI*2);
            if(diff>Math.PI)diff=Math.PI*2-diff;
            if(diff<0.4){a.collected=true;applesCollected++;document.getElementById('appleCount').textContent=applesCollected;playTone(880,80,'sine',0.25);setTimeout(()=>playTone(1108,120,'sine',0.25),80)}
          });
          if(checkCollision(angle)){
            // Hit another knife - game over
            playTone(150,400,'sawtooth',0.3);
            if(navigator.vibrate)navigator.vibrate([100,50,100,50,100]);
            flyingKnife=null;
            gameOver();
            return;
          }
          stuckKnives.push({angle:angle,isObstacle:false});
          knivesThrown++;totalKnivesThrown++;
          flyingKnife=null;
          playTone(300,80,'square',0.15);
          if(navigator.vibrate)navigator.vibrate(30);
          renderKnivesDots();
          if(knivesThrown>=knivesTotal){
            // Stage complete
            stage++;
            document.getElementById('stageNum').textContent=stage;
            const popup=document.getElementById('stagePopup');
            popup.textContent=`ດ່ານ ${stage} 🎉`;
            popup.className='stage-popup show';
            setTimeout(()=>popup.className='stage-popup',1000);
            playTone(523,100,'sine',0.3);setTimeout(()=>playTone(659,100,'sine',0.3),100);setTimeout(()=>playTone(784,150,'sine',0.3),200);
            setupStage();
          }
        }
      }

      // Waiting knife at bottom
      if(!flyingKnife&&gameRunning&&knivesThrown<knivesTotal){
        ctx.save();
        ctx.beginPath();ctx.moveTo(cx,H-60);ctx.lineTo(cx,H-30);
        ctx.strokeStyle='#e2e8f0';ctx.lineWidth=3;ctx.lineCap='round';ctx.stroke();
        ctx.beginPath();ctx.arc(cx,H-30,4,0,Math.PI*2);ctx.fillStyle='#e2e8f0';ctx.fill();
        ctx.beginPath();ctx.moveTo(cx-4,H-60);ctx.lineTo(cx,H-68);ctx.lineTo(cx+4,H-60);
        ctx.fillStyle='#c0c0c0';ctx.fill();
        ctx.restore();
      }

      if(gameRunning)requestAnimationFrame(gameLoop);
    }

    function startGame(){
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('gameOverScreen').classList.add('hidden');
      document.getElementById('gameHeader').style.display='flex';
      document.getElementById('gameArea').style.display='flex';
      document.getElementById('knivesLeft').style.display='flex';
      stage=1;applesCollected=0;totalKnivesThrown=0;logAngle=0;
      document.getElementById('stageNum').textContent='1';
      document.getElementById('appleCount').textContent='0';
      document.getElementById('bestStage').textContent=load('highScore',0);
      resize();
      gameRunning=true;
      setupStage();
      gameLoop();
    }

    function gameOver(){
      gameRunning=false;
      const isNew=stage>load('highScore',0);
      if(isNew)save('highScore',stage);
      const plays=load('totalGames',0)+1;save('totalGames',plays);
      document.getElementById('gameHeader').style.display='none';
      document.getElementById('gameArea').style.display='none';
      document.getElementById('knivesLeft').style.display='none';
      document.getElementById('goEmoji').textContent=stage>=10?'🏆':stage>=5?'🔪':'😢';
      document.getElementById('finalStage').textContent=stage;
      document.getElementById('finalBest').textContent=Math.max(stage,load('highScore',0));
      document.getElementById('finalKnives').textContent=totalKnivesThrown;
      document.getElementById('finalApples').textContent=applesCollected;
      document.getElementById('newRecord').classList.toggle('hidden',!isNew);
      document.getElementById('gameOverScreen').classList.remove('hidden');
    }

    window.addEventListener('resize',()=>{if(gameRunning)resize()});
    const hs=load('highScore',0),tg=load('totalGames',0);
    if(tg>0){document.getElementById('startStats').style.display='grid';document.getElementById('startBest').textContent=hs;document.getElementById('startPlays').textContent=tg}
  </script>
</body>
</html>
