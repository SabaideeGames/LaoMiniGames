<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ບານເດັ້ງ — Bounce Ball</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
    :root{--bg:#0f0f1a;--bg-glass:rgba(255,255,255,0.08);--border-glass:rgba(255,255,255,0.12);--text:#f0f0f5;--text2:#a0a0b8;--accent:#7C3AED;--accent2:#2563EB;--accent-grad:linear-gradient(135deg,#7C3AED,#2563EB);--glow:rgba(124,58,237,0.3);--success:#10b981;--danger:#ef4444;--font:'Noto Sans Lao','Phetsarath OT','Saysettha OT',system-ui,sans-serif}
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;display:flex;flex-direction:column}
    .bg-dec{position:fixed;inset:0;z-index:-1;pointer-events:none}
    .bg-dec::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,0.08)0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(37,99,235,0.06)0%,transparent 50%)}
    .game-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;z-index:10}
    @supports(padding:env(safe-area-inset-top)){.game-header{padding-top:calc(12px + env(safe-area-inset-top))}}
    .game-title{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
    .back-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--border-glass);background:var(--bg-glass);color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none}
    .header-scores{display:flex;gap:16px}.header-score{text-align:center}.header-score-label{font-size:0.65rem;color:var(--text2)}.header-score-value{font-size:1.1rem;font-weight:700}.header-score-value.best{background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .game-area{flex:1;display:flex;align-items:center;justify-content:center;touch-action:none}
    canvas{display:block;max-width:100%;border-radius:12px}
    .overlay{position:fixed;inset:0;background:rgba(15,15,26,0.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;z-index:200;opacity:1;transition:opacity 0.4s}
    .overlay.hidden{opacity:0;pointer-events:none}
    .overlay-emoji{font-size:4rem;margin-bottom:16px;animation:bounceIn 0.5s ease}
    .overlay-title{font-size:2.2rem;font-weight:800;margin-bottom:8px;text-align:center}
    .overlay-sub{font-size:1rem;color:var(--text2);margin-bottom:24px;text-align:center}
    @keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
    .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:300px;margin-bottom:24px}
    .stat-item{text-align:center;padding:14px 8px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:12px}
    .stat-value{font-size:1.8rem;font-weight:700;line-height:1.2}.stat-label{font-size:0.7rem;color:var(--text2);margin-top:4px}
    .new-record{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:999px;font-size:0.8rem;font-weight:600;background:rgba(16,185,129,0.15);color:var(--success);margin-bottom:20px;animation:scaleIn 0.4s ease 0.3s both}
    @keyframes scaleIn{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 40px;border:none;border-radius:999px;font-family:var(--font);font-size:1.15rem;font-weight:600;cursor:pointer;transition:all 0.25s;touch-action:manipulation;min-width:220px}
    .btn:active{transform:scale(0.96)}
    .btn-primary{background:var(--accent-grad);color:white;box-shadow:0 0 20px var(--glow)}
    .btn-secondary{background:var(--bg-glass);color:var(--text);border:1px solid var(--border-glass)}
    .btn-group{display:flex;flex-direction:column;gap:12px;width:100%;max-width:260px}
    .sound-btn{position:fixed;top:12px;right:12px;width:44px;height:44px;border-radius:50%;border:1px solid var(--border-glass);background:var(--bg-glass);color:var(--text);font-size:1.2rem;cursor:pointer;z-index:300;display:flex;align-items:center;justify-content:center}
    @supports(padding:env(safe-area-inset-top)){.sound-btn{top:calc(12px + env(safe-area-inset-top))}}
  </style>
</head>
<body>
  <div class="bg-dec"></div>
  <div class="overlay" id="startScreen">
    <div class="overlay-emoji">⚾</div>
    <div class="overlay-title">ບານເດັ້ງ</div>
    <div class="overlay-sub">ແຕະຊ້າຍ/ຂວາ ເພື່ອໃຫ້ບານເດັ້ງຕໍ່ໄປ!</div>
    <div class="stats-grid" id="startStats" style="display:none">
      <div class="stat-item"><div class="stat-value" id="startBest">0</div><div class="stat-label">ຄະແນນສູງສຸດ</div></div>
      <div class="stat-item"><div class="stat-value" id="startPlays">0</div><div class="stat-label">ຫຼິ້ນແລ້ວ</div></div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="startGame()">⚾ ເລີ່ມຫຼິ້ນ</button>
      <a href="../index.html" class="btn btn-secondary" style="text-decoration:none">🏠 ກັບໜ້າຫຼັກ</a>
    </div>
  </div>
  <div class="overlay hidden" id="gameOverScreen">
    <div class="overlay-emoji" id="goEmoji">😢</div>
    <div class="overlay-title">ຈົບເກມ</div>
    <div class="new-record hidden" id="newRecord">🏆 ສະຖິຕິໃໝ່!</div>
    <div class="stats-grid">
      <div class="stat-item"><div class="stat-value" id="finalScore">0</div><div class="stat-label">ຄະແນນ</div></div>
      <div class="stat-item"><div class="stat-value best" id="finalBest" style="background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">0</div><div class="stat-label">ດີທີ່ສຸດ</div></div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="startGame()">🔄 ລອງໃໝ່</button>
      <a href="../index.html" class="btn btn-secondary" style="text-decoration:none">🏠 ກັບໜ້າຫຼັກ</a>
    </div>
  </div>
  <div class="game-header" id="gameHeader" style="display:none">
    <a href="../index.html" class="back-btn">←</a>
    <div class="game-title"><span>⚾</span><span>ບານເດັ້ງ</span></div>
    <div class="header-scores">
      <div class="header-score"><div class="header-score-label">ຄະແນນ</div><div class="header-score-value" id="scoreVal">0</div></div>
      <div class="header-score"><div class="header-score-label">ດີທີ່ສຸດ</div><div class="header-score-value best" id="bestVal">0</div></div>
    </div>
  </div>
  <div class="game-area" id="gameArea" style="display:none">
    <canvas id="c"></canvas>
  </div>
  <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>

  <script>
    const GAME_ID='bounce-ball';
    const canvas=document.getElementById('c');
    const ctx=canvas.getContext('2d');
    let W,H,dpr;
    let ball,platforms,score,cameraY,gameRunning,moveDir;
    const GRAVITY=0.25,BOUNCE=-9,BALL_R=12;
    const COLORS=['#EF4444','#F97316','#F59E0B','#22C55E','#3B82F6','#8B5CF6','#EC4899','#06B6D4'];
    let soundEnabled=true,audioCtx=null;

    function save(k,v){try{localStorage.setItem(`game_${GAME_ID}_${k}`,JSON.stringify(v))}catch(e){}}
    function load(k,d=null){try{const r=localStorage.getItem(`game_${GAME_ID}_${k}`);return r!==null?JSON.parse(r):d}catch(e){return d}}
    function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}
    function playTone(f,d,t='sine',v=0.2){if(!soundEnabled||!audioCtx)return;if(audioCtx.state==='suspended'){audioCtx.resume().then(()=>playTone(f,d,t,v));return;}try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d/1000);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d/1000)}catch(e){}}
    (function(){function u(){initAudio();document.removeEventListener('touchstart',u,true);document.removeEventListener('touchend',u,true);document.removeEventListener('click',u,true)}document.addEventListener('touchstart',u,true);document.addEventListener('touchend',u,true);document.addEventListener('click',u,true)})();
    function toggleSound(){soundEnabled=!soundEnabled;document.getElementById('soundBtn').textContent=soundEnabled?'🔊':'🔇'}

    function resize(){
      const area=document.getElementById('gameArea');
      const rect=area.getBoundingClientRect();
      dpr=window.devicePixelRatio||1;
      W=Math.min(rect.width-16,420);H=Math.min(rect.height-16,700);
      canvas.style.width=W+'px';canvas.style.height=H+'px';
      canvas.width=W*dpr;canvas.height=H*dpr;
      ctx.scale(dpr,dpr);
    }

    // Touch/mouse controls
    moveDir=0;
    canvas.addEventListener('touchstart',e=>{
      e.preventDefault();
      const t=e.touches[0];
      const rect=canvas.getBoundingClientRect();
      moveDir=t.clientX<rect.left+rect.width/2?-1:1;
    });
    canvas.addEventListener('touchmove',e=>{
      e.preventDefault();
      const t=e.touches[0];
      const rect=canvas.getBoundingClientRect();
      moveDir=t.clientX<rect.left+rect.width/2?-1:1;
    });
    canvas.addEventListener('touchend',()=>moveDir=0);
    canvas.addEventListener('mousedown',e=>{
      const rect=canvas.getBoundingClientRect();
      moveDir=e.clientX<rect.left+rect.width/2?-1:1;
    });
    canvas.addEventListener('mouseup',()=>moveDir=0);

    function genPlatform(y){
      const w=60+Math.random()*40;
      const x=Math.random()*(W-w);
      const type=Math.random();
      let ptype='normal';
      if(type<0.08&&score>5)ptype='break';
      else if(type<0.15&&score>10)ptype='spring';
      return{x,y,w,type:ptype,broken:false,color:COLORS[Math.floor(Math.random()*COLORS.length)]};
    }

    function startGame(){
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('gameOverScreen').classList.add('hidden');
      document.getElementById('gameHeader').style.display='flex';
      document.getElementById('gameArea').style.display='flex';
      resize();
      score=0;cameraY=0;moveDir=0;
      ball={x:W/2,y:H-60,vy:BOUNCE,vx:0};
      platforms=[];
      // Initial platforms
      for(let i=0;i<10;i++){
        platforms.push(genPlatform(H-50-i*65));
      }
      // Starting platform
      platforms.push({x:W/2-40,y:H-40,w:80,type:'normal',broken:false,color:'#22C55E'});
      document.getElementById('scoreVal').textContent='0';
      document.getElementById('bestVal').textContent=load('highScore',0);
      gameRunning=true;
      gameLoop();
    }

    function gameLoop(){
      ctx.clearRect(0,0,W,H);
      // BG
      ctx.fillStyle='#0f0f1a';ctx.fillRect(0,0,W,H);

      // Move ball
      ball.vx=moveDir*5;
      ball.vy+=GRAVITY;
      ball.x+=ball.vx;
      ball.y+=ball.vy;
      // Wrap horizontal
      if(ball.x<0)ball.x=W;
      if(ball.x>W)ball.x=0;

      // Camera follow (only go up)
      const targetCam=ball.y-H*0.35;
      if(targetCam<cameraY)cameraY+=(targetCam-cameraY)*0.1;

      // Platform collision (only when falling)
      if(ball.vy>0){
        for(const p of platforms){
          if(p.broken)continue;
          const py=p.y-cameraY;
          if(ball.y+BALL_R>=p.y&&ball.y+BALL_R<=p.y+10&&ball.x>=p.x-5&&ball.x<=p.x+p.w+5){
            if(p.type==='break'){
              p.broken=true;
              playTone(150,100,'square',0.15);
              continue;
            }
            ball.vy=p.type==='spring'?BOUNCE*1.5:BOUNCE;
            score++;
            document.getElementById('scoreVal').textContent=score;
            playTone(400+score*5,60,'sine',0.15);
            if(navigator.vibrate)navigator.vibrate(20);
          }
        }
      }

      // Generate new platforms above
      const highest=Math.min(...platforms.map(p=>p.y));
      if(highest>cameraY-100){
        const gap=55+Math.random()*20;
        platforms.push(genPlatform(highest-gap));
      }

      // Remove platforms below screen
      platforms=platforms.filter(p=>p.y-cameraY<H+50);

      // Draw platforms
      platforms.forEach(p=>{
        if(p.broken)return;
        const py=p.y-cameraY;
        if(py<-20||py>H+20)return;
        ctx.fillStyle=p.type==='spring'?'#22C55E':p.type==='break'?'rgba(239,68,68,0.5)':p.color;
        ctx.beginPath();
        ctx.roundRect(p.x,py,p.w,10,5);
        ctx.fill();
        if(p.type==='spring'){
          ctx.fillStyle='#16a34a';
          ctx.fillRect(p.x+p.w/2-3,py-6,6,6);
        }
      });

      // Draw ball
      const by=ball.y-cameraY;
      ctx.beginPath();ctx.arc(ball.x,by,BALL_R,0,Math.PI*2);
      const bGrad=ctx.createRadialGradient(ball.x-3,by-3,2,ball.x,by,BALL_R);
      bGrad.addColorStop(0,'#fbbf24');bGrad.addColorStop(1,'#f59e0b');
      ctx.fillStyle=bGrad;ctx.fill();
      ctx.strokeStyle='#d97706';ctx.lineWidth=2;ctx.stroke();
      // Ball shine
      ctx.beginPath();ctx.arc(ball.x-4,by-4,3,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();

      // Score display
      ctx.fillStyle='rgba(255,255,255,0.1)';ctx.font='bold 60px system-ui';ctx.textAlign='center';
      ctx.fillText(score,W/2,H*0.15);

      // Guide arrows
      ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='14px var(--font)';ctx.textAlign='center';
      ctx.fillText('◀ ຊ້າຍ',50,H-20);ctx.fillText('ຂວາ ▶',W-50,H-20);

      // Game over check
      if(by>H+50){
        gameRunning=false;
        playTone(200,300,'sawtooth',0.2);
        if(navigator.vibrate)navigator.vibrate([100,50,100]);
        const isNew=score>load('highScore',0);
        if(isNew)save('highScore',score);
        const plays=load('totalGames',0)+1;save('totalGames',plays);
        document.getElementById('gameHeader').style.display='none';
        document.getElementById('gameArea').style.display='none';
        document.getElementById('goEmoji').textContent=score>=50?'🏆':score>=20?'⚾':'😢';
        document.getElementById('finalScore').textContent=score;
        document.getElementById('finalBest').textContent=Math.max(score,load('highScore',0));
        document.getElementById('newRecord').classList.toggle('hidden',!isNew);
        document.getElementById('gameOverScreen').classList.remove('hidden');
        return;
      }

      if(gameRunning)requestAnimationFrame(gameLoop);
    }

    window.addEventListener('resize',()=>{if(gameRunning)resize()});
    const hs=load('highScore',0),tg=load('totalGames',0);
    if(tg>0){document.getElementById('startStats').style.display='grid';document.getElementById('startBest').textContent=hs;document.getElementById('startPlays').textContent=tg}
  </script>
</body>
</html>
