<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ງູ — Snake</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
    :root{--bg:#0f0f1a;--bg-glass:rgba(255,255,255,0.08);--border-glass:rgba(255,255,255,0.12);--text:#f0f0f5;--text2:#a0a0b8;--accent-grad:linear-gradient(135deg,#7C3AED,#2563EB);--glow:rgba(124,58,237,0.3);--success:#10B981;--font:'Noto Sans Lao','Phetsarath OT',system-ui,sans-serif}
    body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;display:flex;flex-direction:column}
    .bg{position:fixed;inset:0;z-index:-1;pointer-events:none}
    .bg::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,0.08)0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(37,99,235,0.06)0%,transparent 50%)}

    .overlay{position:fixed;inset:0;z-index:100;background:rgba(15,15,26,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;opacity:1;transition:opacity 0.4s}
    .overlay.hidden{opacity:0;pointer-events:none}
    .ov-emoji{font-size:3.5rem;margin-bottom:12px;animation:bounceIn 0.5s ease}
    @keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
    .ov-title{font-size:2.2rem;font-weight:800;text-align:center;margin-bottom:6px}
    .ov-sub{font-size:0.95rem;color:var(--text2);text-align:center;margin-bottom:28px;max-width:300px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 36px;border:none;border-radius:999px;font-family:var(--font);font-size:1.1rem;font-weight:600;cursor:pointer;transition:all 0.25s;touch-action:manipulation;min-width:200px}
    .btn:active{transform:scale(0.96)}
    .btn-primary{background:var(--accent-grad);color:white;box-shadow:0 0 20px var(--glow)}
    .btn-secondary{background:var(--bg-glass);color:var(--text);border:1px solid var(--border-glass)}
    .btn-group{display:flex;flex-direction:column;gap:12px;width:100%;max-width:260px;align-items:center}
    .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:300px;margin-bottom:24px}
    .stat-item{text-align:center;padding:14px 8px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:12px}
    .stat-value{font-size:1.8rem;font-weight:700}
    .stat-value.best{background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .stat-label{font-size:0.7rem;color:var(--text2);margin-top:4px}
    .new-record{display:inline-flex;gap:6px;padding:4px 14px;border-radius:999px;font-size:0.8rem;font-weight:600;background:rgba(16,185,129,0.15);color:var(--success);margin-bottom:16px}
    .new-record.hidden{display:none}

    .game-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;z-index:10}
    @supports(padding:env(safe-area-inset-top)){.game-header{padding-top:calc(10px+env(safe-area-inset-top))}}
    .game-title{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px}
    .scores{display:flex;gap:14px}.score-box{text-align:center}.score-lbl{font-size:0.55rem;color:var(--text2)}.score-val{font-size:1rem;font-weight:700}
    .score-val.best{background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

    .game-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;gap:12px}
    canvas{border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid var(--border-glass)}

    /* D-Pad controls */
    .dpad{display:grid;grid-template-columns:60px 60px 60px;grid-template-rows:60px 60px;gap:4px;margin-bottom:8px}
    .dpad-btn{border:none;border-radius:12px;background:var(--bg-glass);color:var(--text);font-size:1.5rem;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center;border:1px solid var(--border-glass);transition:background 0.1s}
    .dpad-btn:active{background:rgba(255,255,255,0.15)}
    .dpad-up{grid-column:2;grid-row:1}
    .dpad-left{grid-column:1;grid-row:2}
    .dpad-down{grid-column:2;grid-row:2}
    .dpad-right{grid-column:3;grid-row:2}

    .sound-btn{position:fixed;top:12px;right:12px;z-index:200;width:40px;height:40px;padding:0;border-radius:50%;font-size:1.1rem;background:var(--bg-glass);color:var(--text);border:1px solid var(--border-glass);cursor:pointer;touch-action:manipulation}
    @supports(padding:env(safe-area-inset-top)){.sound-btn{top:calc(12px+env(safe-area-inset-top))}}
    .start-best{margin-top:16px;text-align:center}
    .start-best-lbl{font-size:0.7rem;color:var(--text2)}
    .start-best-val{font-size:1.3rem;font-weight:700;background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="overlay" id="startScreen">
    <div class="ov-emoji">🐍</div>
    <div class="ov-title">ງູ</div>
    <div class="ov-sub">ກິນອາຫານ ແລະ ຫຼີກລ້ຽງການຊົນ!</div>
    <div class="btn-group"><button class="btn btn-primary" onclick="startGame()">🎮 ເລີ່ມຫຼິ້ນ</button></div>
    <div class="start-best"><div class="start-best-lbl">ຄະແນນສູງສຸດ</div><div class="start-best-val" id="startBest">0</div></div>
  </div>

  <div class="overlay hidden" id="overScreen">
    <div class="ov-emoji" id="overEmoji">😢</div>
    <div class="ov-title">ຈົບເກມ</div>
    <div class="new-record hidden" id="nrBadge">🏆 ສະຖິຕິໃໝ່!</div>
    <div class="stats-grid">
      <div class="stat-item"><div class="stat-value" id="fScore">0</div><div class="stat-label">ຄະແນນ</div></div>
      <div class="stat-item"><div class="stat-value best" id="fBest">0</div><div class="stat-label">ດີທີ່ສຸດ</div></div>
      <div class="stat-item"><div class="stat-value" id="fLen">0</div><div class="stat-label">ຄວາມຍາວ</div></div>
      <div class="stat-item"><div class="stat-value" id="fGames">0</div><div class="stat-label">ຫຼິ້ນແລ້ວ</div></div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="startGame()">🔄 ລອງໃໝ່</button>
      <button class="btn btn-secondary" onclick="showStart()">🏠 ໜ້າຫຼັກ</button>
    </div>
  </div>

  <div id="gameUI" style="display:none;flex-direction:column;height:100vh;height:100dvh">
    <div class="game-header">
      <div class="game-title"><span>🐍</span><span>ງູ</span></div>
      <div class="scores">
        <div class="score-box"><div class="score-lbl">ຄະແນນ</div><div class="score-val" id="scoreD">0</div></div>
        <div class="score-box"><div class="score-lbl">ດີທີ່ສຸດ</div><div class="score-val best" id="bestD">0</div></div>
      </div>
    </div>
    <div class="game-area">
      <canvas id="canvas"></canvas>
      <div class="dpad" id="dpad">
        <button class="dpad-btn dpad-up" onclick="setDir(0,-1)">⬆️</button>
        <button class="dpad-btn dpad-left" onclick="setDir(-1,0)">⬅️</button>
        <button class="dpad-btn dpad-down" onclick="setDir(0,1)">⬇️</button>
        <button class="dpad-btn dpad-right" onclick="setDir(1,0)">➡️</button>
      </div>
    </div>
  </div>

  <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>

  <script>
    const GID='snake',GRID=20;
    const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
    let snake,food,dir,nextDir,score,gameOn,speed,loopId;

    function sv(k,v){try{localStorage.setItem(`game_${GID}_${k}`,JSON.stringify(v))}catch(e){}}
    function ld(k,d=null){try{const r=localStorage.getItem(`game_${GID}_${k}`);return r!==null?JSON.parse(r):d}catch(e){return d}}
    function getHS(){return ld('hs',0)}function updHS(s){const b=getHS();if(s>b){sv('hs',s);return true}return false}
    function incG(){const g=ld('tg',0)+1;sv('tg',g);return g}

    let aC=null,snd=true;
    function initA(){if(!aC)aC=new(window.AudioContext||window.webkitAudioContext)();if(aC.state==='suspended')aC.resume()}
    function tone(f,d,t='sine',v=0.12){if(!snd||!aC)return;try{const o=aC.createOscillator(),g=aC.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,aC.currentTime+d/1000);o.connect(g);g.connect(aC.destination);o.start();o.stop(aC.currentTime+d/1000)}catch(e){}}
    function toggleSound(){snd=!snd;document.getElementById('soundBtn').textContent=snd?'🔊':'🔇'}
    function vib(p){if(navigator.vibrate)navigator.vibrate(p)}
    // Mobile audio unlock
    (function(){function u(){initA();document.removeEventListener('touchstart',u,true);document.removeEventListener('touchend',u,true);document.removeEventListener('click',u,true)}document.addEventListener('touchstart',u,true);document.addEventListener('touchend',u,true);document.addEventListener('click',u,true)})()

    function resizeCanvas(){
      const area=document.querySelector('.game-area');
      const rect=area.getBoundingClientRect();
      const s=Math.min(rect.width-20,rect.height-120,380);
      canvas.width=s;canvas.height=s;canvas.style.width=s+'px';canvas.style.height=s+'px';
    }

    function cellSize(){return canvas.width/GRID}

    function spawnFood(){
      let x,y;
      do{x=Math.floor(Math.random()*GRID);y=Math.floor(Math.random()*GRID)}
      while(snake.some(s=>s.x===x&&s.y===y));
      food={x,y};
    }

    function draw(){
      const cs=cellSize();
      ctx.clearRect(0,0,canvas.width,canvas.height);

      // Grid lines
      ctx.strokeStyle='rgba(255,255,255,0.03)';
      for(let i=0;i<=GRID;i++){ctx.beginPath();ctx.moveTo(i*cs,0);ctx.lineTo(i*cs,canvas.height);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*cs);ctx.lineTo(canvas.width,i*cs);ctx.stroke()}

      // Food
      ctx.fillStyle='#EF4444';
      ctx.beginPath();
      ctx.arc((food.x+0.5)*cs,(food.y+0.5)*cs,cs*0.4,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle='#FCA5A5';
      ctx.beginPath();ctx.arc((food.x+0.35)*cs,(food.y+0.35)*cs,cs*0.12,0,Math.PI*2);ctx.fill();

      // Snake
      snake.forEach((seg,i)=>{
        const t=i/snake.length;
        const r=Math.floor(34+t*90);
        const g=Math.floor(197-t*60);
        const b=Math.floor(94+t*80);
        ctx.fillStyle=`rgb(${r},${g},${b})`;
        ctx.beginPath();
        const rad=i===0?cs*0.45:cs*0.38;
        ctx.arc((seg.x+0.5)*cs,(seg.y+0.5)*cs,rad,0,Math.PI*2);
        ctx.fill();
      });

      // Eyes on head
      const head=snake[0];
      ctx.fillStyle='white';
      const ex1=(head.x+0.35)*cs,ey1=(head.y+0.35)*cs;
      const ex2=(head.x+0.65)*cs,ey2=(head.y+0.35)*cs;
      ctx.beginPath();ctx.arc(ex1,ey1,cs*0.08,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ex2,ey2,cs*0.08,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#0f0f1a';
      ctx.beginPath();ctx.arc(ex1+dir.x*2,ey1+dir.y*2,cs*0.04,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ex2+dir.x*2,ey2+dir.y*2,cs*0.04,0,Math.PI*2);ctx.fill();
    }

    function update(){
      if(!gameOn)return;
      dir=nextDir;
      const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};

      // Wall collision
      if(head.x<0||head.x>=GRID||head.y<0||head.y>=GRID){gameOver();return}
      // Self collision
      if(snake.some(s=>s.x===head.x&&s.y===head.y)){gameOver();return}

      snake.unshift(head);

      if(head.x===food.x&&head.y===food.y){
        score+=10;
        tone(500+score*5,50);vib(20);
        document.getElementById('scoreD').textContent=score;
        spawnFood();
        // Speed up
        speed=Math.max(60,150-score);
      }else{
        snake.pop();
      }

      draw();
    }

    function gameLoop(){
      update();
      if(gameOn)loopId=setTimeout(gameLoop,speed);
    }

    function gameOver(){
      gameOn=false;
      tone(200,300,'sawtooth',0.12);vib([100,30,100]);
      const isNew=updHS(score);const tg=incG();
      document.getElementById('fScore').textContent=score;
      document.getElementById('fBest').textContent=getHS();
      document.getElementById('fLen').textContent=snake.length;
      document.getElementById('fGames').textContent=tg;
      const b=document.getElementById('nrBadge'),e=document.getElementById('overEmoji');
      if(isNew&&score>0){b.classList.remove('hidden');e.textContent='🏆'}else{b.classList.add('hidden');e.textContent=score>50?'😊':'😢'}
      setTimeout(()=>document.getElementById('overScreen').classList.remove('hidden'),400);
    }

    function setDir(dx,dy){
      if(!gameOn)return;
      // Prevent 180° turn
      if(dir.x===-dx&&dir.y===-dy)return;
      nextDir={x:dx,y:dy};
    }

    function startGame(){
      initA();score=0;speed=150;gameOn=true;
      snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
      dir={x:1,y:0};nextDir={x:1,y:0};
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('overScreen').classList.add('hidden');
      document.getElementById('gameUI').style.display='flex';
      document.getElementById('scoreD').textContent='0';
      document.getElementById('bestD').textContent=getHS();
      resizeCanvas();spawnFood();draw();
      if(loopId)clearTimeout(loopId);
      loopId=setTimeout(gameLoop,speed);
    }

    function showStart(){
      document.getElementById('startScreen').classList.remove('hidden');
      document.getElementById('overScreen').classList.add('hidden');
      document.getElementById('gameUI').style.display='none';
      document.getElementById('startBest').textContent=getHS();
      gameOn=false;if(loopId)clearTimeout(loopId);
    }

    // Swipe
    let sx=0,sy=0;
    document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
    document.addEventListener('touchend',e=>{
      if(!gameOn)return;
      const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
      if(Math.max(Math.abs(dx),Math.abs(dy))<30)return;
      if(Math.abs(dx)>Math.abs(dy))setDir(dx>0?1:-1,0);
      else setDir(0,dy>0?1:-1);
    },{passive:true});

    // Keyboard
    document.addEventListener('keydown',e=>{
      if(e.key==='ArrowUp')setDir(0,-1);
      else if(e.key==='ArrowDown')setDir(0,1);
      else if(e.key==='ArrowLeft')setDir(-1,0);
      else if(e.key==='ArrowRight')setDir(1,0);
    });

    window.addEventListener('resize',()=>{if(gameOn){resizeCanvas();draw()}});
    document.getElementById('startBest').textContent=getHS();
  </script>
</body>
</html>
