<!DOCTYPE html>
<html lang="lo"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>ຈັບຄູ່ສາມ — Tile Match</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0f0f1a;--bg-glass:rgba(255,255,255,0.08);--border-glass:rgba(255,255,255,0.12);--text:#f0f0f5;--text2:#a0a0b8;--accent:#7C3AED;--accent-grad:linear-gradient(135deg,#7C3AED,#2563EB);--glow:rgba(124,58,237,0.3);--success:#10b981;--danger:#ef4444;--font:'Noto Sans Lao','Phetsarath OT',system-ui,sans-serif}body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow:hidden;overscroll-behavior:none;user-select:none;-webkit-user-select:none;display:flex;flex-direction:column}
.bg-dec{position:fixed;inset:0;z-index:-1;pointer-events:none}.bg-dec::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,0.08)0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(37,99,235,0.06)0%,transparent 50%)}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;z-index:10}@supports(padding:env(safe-area-inset-top)){.header{padding-top:calc(12px + env(safe-area-inset-top))}}.title{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}.back{width:44px;height:44px;border-radius:50%;border:1px solid var(--border-glass);background:var(--bg-glass);color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none}
.scores{display:flex;gap:16px}.sc{text-align:center}.sc-l{font-size:0.65rem;color:var(--text2)}.sc-v{font-size:1.1rem;font-weight:700}.sc-v.best{background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:16px;overflow-y:auto}
.tiles{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;width:100%;max-width:360px}
.tile{aspect-ratio:1;border-radius:12px;font-size:2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg-glass);border:2px solid var(--border-glass);transition:all 0.15s;touch-action:manipulation}
.tile:active{transform:scale(0.9)}.tile.selected{border-color:var(--accent);box-shadow:0 0 15px var(--glow);transform:scale(1.05)}
.slot-bar{display:flex;gap:6px;padding:8px 16px;background:var(--bg-glass);border:2px solid var(--border-glass);border-radius:16px;min-height:56px;align-items:center;width:100%;max-width:360px;justify-content:center}
.slot{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px dashed var(--border-glass);display:flex;align-items:center;justify-content:center;font-size:1.5rem;transition:all 0.2s}
.slot.filled{border-style:solid;background:var(--bg-glass)}
.overlay{position:fixed;inset:0;background:rgba(15,15,26,0.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;z-index:200;opacity:1;transition:opacity 0.4s}.overlay.hidden{opacity:0;pointer-events:none}
.ov-emoji{font-size:4rem;margin-bottom:16px;animation:bounceIn 0.5s}.ov-title{font-size:2.2rem;font-weight:800;margin-bottom:8px;text-align:center}.ov-sub{font-size:1rem;color:var(--text2);margin-bottom:24px;text-align:center}@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:300px;margin-bottom:24px}.si{text-align:center;padding:14px 8px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:12px}.sv{font-size:1.8rem;font-weight:700}.sl{font-size:0.7rem;color:var(--text2);margin-top:4px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 40px;border:none;border-radius:999px;font-family:var(--font);font-size:1.15rem;font-weight:600;cursor:pointer;transition:all 0.25s;touch-action:manipulation;min-width:220px}.btn:active{transform:scale(0.96)}.btn-primary{background:var(--accent-grad);color:white;box-shadow:0 0 20px var(--glow)}.btn-secondary{background:var(--bg-glass);color:var(--text);border:1px solid var(--border-glass)}.btn-group{display:flex;flex-direction:column;gap:12px;width:100%;max-width:260px}
.sound-btn{position:fixed;top:12px;right:12px;width:44px;height:44px;border-radius:50%;border:1px solid var(--border-glass);background:var(--bg-glass);color:var(--text);font-size:1.2rem;cursor:pointer;z-index:300;display:flex;align-items:center;justify-content:center}
</style></head><body><div class="bg-dec"></div>
<div class="overlay" id="startScr"><div class="ov-emoji">🧩</div><div class="ov-title">ຈັບຄູ່ສາມ</div><div class="ov-sub">ເລືອກ 3 ອັນດຽວກັນ — ກວາດໃຫ້ໝົດ!</div>
<div class="sg" id="ss" style="display:none"><div class="si"><div class="sv" id="sBest">0</div><div class="sl">ຄະແນນສູງສຸດ</div></div><div class="si"><div class="sv" id="sPlays">0</div><div class="sl">ຫຼິ້ນແລ້ວ</div></div></div>
<div class="btn-group"><button class="btn btn-primary" onclick="startGame()">🧩 ເລີ່ມ</button><a href="../index.html" class="btn btn-secondary" style="text-decoration:none">🏠 ກັບໜ້າຫຼັກ</a></div></div>
<div class="overlay hidden" id="winScr"><div class="ov-emoji">🎉</div><div class="ov-title">ຊະນະ!</div><div class="ov-sub" id="winSub">ກວາດໝົດ!</div>
<div class="btn-group"><button class="btn btn-primary" onclick="startGame()">🔄 ດ່ານໃໝ່</button><a href="../index.html" class="btn btn-secondary" style="text-decoration:none">🏠 ກັບໜ້າຫຼັກ</a></div></div>
<div class="overlay hidden" id="goScr"><div class="ov-emoji">😢</div><div class="ov-title">ເຕັມແລ້ວ!</div><div class="ov-sub">ຊ່ອງລໍ້ຖ້າເຕັມ 7 ອັນແລ້ວ</div>
<div class="btn-group"><button class="btn btn-primary" onclick="startGame()">🔄 ລອງໃໝ່</button><a href="../index.html" class="btn btn-secondary" style="text-decoration:none">🏠 ກັບໜ້າຫຼັກ</a></div></div>
<div class="header" id="hdr" style="display:none"><a href="../index.html" class="back">←</a><div class="title"><span>🧩</span><span>ຈັບຄູ່ສາມ</span></div><div class="scores"><div class="sc"><div class="sc-l">ຄະແນນ</div><div class="sc-v" id="scV">0</div></div><div class="sc"><div class="sc-l">ເຫຼືອ</div><div class="sc-v" id="remV">0</div></div></div></div>
<div class="area" id="ga" style="display:none"><div class="tiles" id="tiles"></div><div class="slot-bar" id="slotBar"></div></div>
<button class="sound-btn" id="snd" onclick="sndOn=!sndOn;this.textContent=sndOn?'🔊':'🔇'">🔊</button>
<script>
const GID='tile-match';
const EMOJIS=['🍎','🍊','🍋','🍇','🍓','🍑','🥝','🍒','🫐','🍌','🥭','🍍'];
let tiles=[],slots=[],score=0,maxSlots=7,active=false,sndOn=true,ac=null;
function save(k,v){try{localStorage.setItem(`game_${GID}_${k}`,JSON.stringify(v))}catch(e){}}
function load(k,d=null){try{const r=localStorage.getItem(`game_${GID}_${k}`);return r!==null?JSON.parse(r):d}catch(e){return d}}
function initAudio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume()}
function playTone(f,d,t='sine',v=0.2){if(!sndOn||!ac)return;if(ac.state==='suspended'){ac.resume().then(()=>playTone(f,d,t,v));return;}try{const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d/1000);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d/1000)}catch(e){}}
(function(){function u(){initAudio();document.removeEventListener('touchstart',u,true);document.removeEventListener('touchend',u,true);document.removeEventListener('click',u,true)}document.addEventListener('touchstart',u,true);document.addEventListener('touchend',u,true);document.addEventListener('click',u,true)})();
function genTiles(){
  const numTypes=6;const perType=6;tiles=[];
  for(let i=0;i<numTypes;i++)for(let j=0;j<perType;j++)tiles.push(EMOJIS[i]);
  // Shuffle
  for(let i=tiles.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[tiles[i],tiles[j]]=[tiles[j],tiles[i]]}
}
function renderTiles(){
  const c=document.getElementById('tiles');c.innerHTML='';
  tiles.forEach((t,i)=>{if(!t)return;const d=document.createElement('div');d.className='tile';d.textContent=t;d.onclick=()=>pickTile(i);c.appendChild(d)});
  // Fill empty
  const empty=36-tiles.filter(Boolean).length;
  document.getElementById('remV').textContent=tiles.filter(Boolean).length
}
function renderSlots(){
  const c=document.getElementById('slotBar');c.innerHTML='';
  for(let i=0;i<maxSlots;i++){const d=document.createElement('div');d.className='slot'+(i<slots.length?' filled':'');d.textContent=slots[i]||'';c.appendChild(d)}
}
function pickTile(i){
  if(!active||!tiles[i])return;
  slots.push(tiles[i]);tiles[i]=null;
  playTone(500,40,'sine',0.15);renderTiles();renderSlots();
  // Check for 3 of a kind
  const counts={};slots.forEach(s=>{counts[s]=(counts[s]||0)+1});
  for(const[emoji,count] of Object.entries(counts)){
    if(count>=3){
      setTimeout(()=>{
        let removed=0;slots=slots.filter(s=>{if(s===emoji&&removed<3){removed++;return false}return true});
        score+=10;document.getElementById('scV').textContent=score;
        playTone(523,80,'sine',0.25);setTimeout(()=>playTone(659,80,'sine',0.25),80);
        if(navigator.vibrate)navigator.vibrate(30);renderSlots();
        if(tiles.filter(Boolean).length===0&&slots.length===0){win()}
      },300);return
    }
  }
  // Check lose
  if(slots.length>=maxSlots){active=false;setTimeout(()=>{
    save('tg',(load('tg',0)||0)+1);document.getElementById('hdr').style.display='none';document.getElementById('ga').style.display='none';
    document.getElementById('goScr').classList.remove('hidden')},500);return}
  if(tiles.filter(Boolean).length===0&&slots.length===0)win()
}
function win(){
  active=false;playTone(523,100,'sine',0.3);setTimeout(()=>playTone(784,150,'sine',0.3),200);
  save('hs',Math.max(score,load('hs',0)||0));save('tg',(load('tg',0)||0)+1);
  setTimeout(()=>{document.getElementById('hdr').style.display='none';document.getElementById('ga').style.display='none';
    document.getElementById('winScr').classList.remove('hidden')},500)
}
function startGame(){
  document.querySelectorAll('.overlay').forEach(o=>o.classList.add('hidden'));document.getElementById('hdr').style.display='flex';document.getElementById('ga').style.display='flex';
  score=0;slots=[];active=true;genTiles();document.getElementById('scV').textContent='0';renderTiles();renderSlots()
}
const hs=load('hs',0),tg=load('tg',0);if(tg>0){document.getElementById('ss').style.display='grid';document.getElementById('sBest').textContent=hs;document.getElementById('sPlays').textContent=tg}
</script></body></html>
