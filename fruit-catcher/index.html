<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ຈັບໝາກ – LaoMiniGames</title>
<style>
:root {
  --bg: #0f0f1a;
  --bg-glass: rgba(255,255,255,0.08);
  --border-glass: rgba(255,255,255,0.12);
  --text: #f0f0f5;
  --text2: #a0a0b8;
  --accent-grad: linear-gradient(135deg,#7C3AED,#2563EB);
  --glow: rgba(124,58,237,0.3);
  --success: #10B981;
  --font: 'Noto Sans Lao','Phetsarath OT',system-ui,sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;overscroll-behavior:none;user-select:none;-webkit-user-select:none;display:flex;flex-direction:column}
.overlay{position:fixed;inset:0;z-index:100;background:rgba(15,15,26,0.92);backdrop-filter:blur(16px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;transition:opacity 0.4s}
.overlay.hidden{opacity:0;pointer-events:none}
.ov-emoji{font-size:3.5rem;margin-bottom:12px;animation:bounceIn 0.5s ease}
.ov-title{font-size:2.2rem;font-weight:800;text-align:center;margin-bottom:6px}
.ov-sub{font-size:0.95rem;color:var(--text2);text-align:center;margin-bottom:24px;max-width:300px}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 36px;border:none;border-radius:999px;font-family:var(--font);font-size:1.1rem;font-weight:600;cursor:pointer;transition:all 0.25s;touch-action:manipulation;min-width:200px}
.btn:active{transform:scale(0.96)}
.btn-primary{background:var(--accent-grad);color:white;box-shadow:0 0 20px var(--glow)}
.btn-secondary{background:var(--bg-glass);color:var(--text);border:1px solid var(--border-glass)}
.btn-group{display:flex;flex-direction:column;gap:12px;width:100%;max-width:260px;align-items:center}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:300px;margin-bottom:24px}
.stat-item{text-align:center;padding:14px 8px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:12px}
.stat-value{font-size:1.8rem;font-weight:700}
.stat-value.best{background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:0.7rem;color:var(--text2);margin-top:4px}
.new-record{display:inline-flex;gap:6px;padding:4px 14px;border-radius:999px;font-size:0.8rem;font-weight:600;background:rgba(16,185,129,0.15);color:var(--success);margin-bottom:16px}
.new-record.hidden{display:none}
.game-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;z-index:10}
.back-btn{width:40px;height:40px;border-radius:50%;background:var(--bg-glass);border:1px solid var(--border-glass);color:var(--text);font-size:1.2rem;display:flex;align-items:center;justify-content:center;text-decoration:none;cursor:pointer}
.game-title{font-size:1rem;font-weight:700}
.scores{display:flex;gap:14px}
.score-box{text-align:center}
.score-lbl{font-size:0.55rem;color:var(--text2)}
.score-val{font-size:1rem;font-weight:700}
.score-val.best{background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sound-btn{position:fixed;top:12px;right:12px;z-index:200;width:40px;height:40px;padding:0;border-radius:50%;font-size:1.1rem;background:var(--bg-glass);color:var(--text);border:1px solid var(--border-glass);cursor:pointer;touch-action:manipulation}
.start-best{margin-top:16px;text-align:center}
.start-best-lbl{font-size:0.7rem;color:var(--text2)}
.start-best-val{font-size:1.3rem;font-weight:700;background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#gameCanvas{display:block;flex:1;width:100%;touch-action:none}
.lives{font-size:1.1rem;letter-spacing:2px}
</style>
</head>
<body>

<!-- Sound button -->
<button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>

<!-- Start Overlay -->
<div class="overlay" id="startOverlay">
  <div class="ov-emoji">🧺</div>
  <div class="ov-title">ຈັບໝາກ</div>
  <div class="ov-sub">ຈັບໝາກໄມ້ທີ່ລົ້ມລົງ!</div>
  <div class="start-best" id="startBest">
    <div class="start-best-lbl">ສະຖິຕິດີສຸດ</div>
    <div class="start-best-val" id="startBestVal">0</div>
  </div>
  <div style="margin-top:24px" class="btn-group">
    <button class="btn btn-primary" onclick="startGame()">▶ ເລີ່ມເກມ</button>
    <a class="btn btn-secondary" href="../index.html">🏠 ໜ້າຫຼັກ</a>
  </div>
</div>

<!-- Game Over Overlay -->
<div class="overlay hidden" id="overOverlay">
  <div class="ov-emoji">💔</div>
  <div class="ov-title">ຈົບເກມ!</div>
  <div class="new-record hidden" id="newRecord">🏆 ສະຖິຕິໃໝ່!</div>
  <div class="stats-grid">
    <div class="stat-item">
      <div class="stat-value" id="ovScore">0</div>
      <div class="stat-label">ຄະແນນ</div>
    </div>
    <div class="stat-item">
      <div class="stat-value best" id="ovBest">0</div>
      <div class="stat-label">ດີສຸດ</div>
    </div>
    <div class="stat-item" style="grid-column:1/-1">
      <div class="stat-value" id="ovCaught">0</div>
      <div class="stat-label">ໝາກທີ່ຈັບໄດ້</div>
    </div>
  </div>
  <div class="btn-group">
    <button class="btn btn-primary" onclick="startGame()">🔄 ຫຼິ້ນອີກ</button>
    <a class="btn btn-secondary" href="../index.html">🏠 ໜ້າຫຼັກ</a>
  </div>
</div>

<!-- Header -->
<div class="game-header">
  <a class="back-btn" href="../index.html">‹</a>
  <div class="game-title">ຈັບໝາກ 🧺</div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="lives" id="livesDisplay">❤️❤️❤️</div>
    <div class="scores">
      <div class="score-box">
        <div class="score-lbl">ຄະແນນ</div>
        <div class="score-val" id="scoreVal">0</div>
      </div>
      <div class="score-box">
        <div class="score-lbl">ດີສຸດ</div>
        <div class="score-val best" id="bestVal">0</div>
      </div>
    </div>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
// ── Storage ──────────────────────────────────────────────
const GID = 'fruit-catcher';
function sv(k,v){try{localStorage.setItem(`game_${GID}_${k}`,JSON.stringify(v))}catch(e){}}
function ld(k,d=null){try{const r=localStorage.getItem(`game_${GID}_${k}`);return r!==null?JSON.parse(r):d}catch(e){return d}}
function getHS(){return ld('hs',0)}
function updHS(s){const b=getHS();if(s>b){sv('hs',s);return true}return false}

// ── Audio ─────────────────────────────────────────────────
let aC=null,snd=true;
function initA(){if(!aC)aC=new(window.AudioContext||window.webkitAudioContext)();if(aC.state==='suspended')aC.resume()}
function tone(f,d,t='sine',v=0.12){if(!snd||!aC)return;try{const o=aC.createOscillator(),g=aC.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,aC.currentTime+d/1000);o.connect(g);g.connect(aC.destination);o.start();o.stop(aC.currentTime+d/1000)}catch(e){}}
function toggleSound(){snd=!snd;document.getElementById('soundBtn').textContent=snd?'🔊':'🔇'}
(function(){function u(){initA();document.removeEventListener('touchstart',u,true)}document.addEventListener('touchstart',u,true)})();

// ── Canvas setup ──────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); if (running) drawFrame(); });

// ── Game constants ────────────────────────────────────────
const FRUITS = ['🍎','🍊','🍋','🍇','🍓','🍑','🍉'];
const BASKET_W = 80;
const BASKET_H = 50;
const FRUIT_SIZE = 32;
const MAX_LIVES = 3;
const CATCH_ZONE_EXTRA = 10;

// ── Game state ────────────────────────────────────────────
let score = 0, lives = MAX_LIVES, caughtCount = 0;
let fruits = [], sparkles = [], stars = [];
let basketX = 0;
let running = false;
let animId = null;
let frameCount = 0;
let keysDown = {};

function initStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      a: Math.random()
    });
  }
}

function spawnFruit() {
  const margin = 30;
  fruits.push({
    x: margin + Math.random() * (canvas.width - margin * 2),
    y: -FRUIT_SIZE,
    emoji: FRUITS[Math.floor(Math.random() * FRUITS.length)],
    speed: 2 + (score / 100) * 0.8 + Math.random() * 0.5
  });
}

function maxFruits() {
  return Math.min(2 + Math.floor(score / 50), 6);
}

function addSparkle(x, y) {
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 / 8) * i + Math.random() * 0.3;
    sparkles.push({
      x, y,
      vx: Math.cos(angle) * (2 + Math.random() * 3),
      vy: Math.sin(angle) * (2 + Math.random() * 3),
      life: 1,
      color: `hsl(${Math.random()*60+260},90%,70%)`
    });
  }
}

function updateLivesDisplay() {
  document.getElementById('livesDisplay').textContent = '❤️'.repeat(lives) + '🖤'.repeat(MAX_LIVES - lives);
}

function updateScore() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('bestVal').textContent = getHS();
}

function drawStars() {
  stars.forEach(s => {
    s.a += 0.005;
    const alpha = 0.3 + 0.4 * Math.abs(Math.sin(s.a));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,200,255,${alpha})`;
    ctx.fill();
  });
}

function drawBasket(x) {
  const bx = x - BASKET_W / 2;
  const by = canvas.height - BASKET_H - 8;

  // Rim
  const rimGrad = ctx.createLinearGradient(bx, by, bx + BASKET_W, by);
  rimGrad.addColorStop(0, '#7C3AED');
  rimGrad.addColorStop(1, '#2563EB');
  ctx.fillStyle = rimGrad;
  ctx.beginPath();
  ctx.roundRect(bx, by, BASKET_W, 12, 6);
  ctx.fill();

  // Body (trapezoid)
  ctx.beginPath();
  ctx.moveTo(bx + 6, by + 12);
  ctx.lineTo(bx + BASKET_W - 6, by + 12);
  ctx.lineTo(bx + BASKET_W - 2, by + BASKET_H);
  ctx.lineTo(bx + 2, by + BASKET_H);
  ctx.closePath();
  const bodyGrad = ctx.createLinearGradient(bx, by + 12, bx, by + BASKET_H);
  bodyGrad.addColorStop(0, 'rgba(124,58,237,0.7)');
  bodyGrad.addColorStop(1, 'rgba(37,99,235,0.5)');
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  // Glow
  ctx.shadowColor = 'rgba(124,58,237,0.6)';
  ctx.shadowBlur = 16;
  ctx.beginPath();
  ctx.roundRect(bx, by, BASKET_W, 12, 6);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawFruits() {
  ctx.font = `${FRUIT_SIZE}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  fruits.forEach(f => {
    ctx.fillText(f.emoji, f.x, f.y);
  });
}

function drawSparkles() {
  sparkles.forEach(s => {
    s.x += s.vx;
    s.y += s.vy;
    s.vy += 0.15;
    s.life -= 0.05;
    ctx.beginPath();
    ctx.arc(s.x, s.y, 3 * s.life, 0, Math.PI * 2);
    ctx.fillStyle = s.color.replace(')', `,${s.life})`).replace('hsl', 'hsla');
    ctx.fill();
  });
  sparkles = sparkles.filter(s => s.life > 0);
}

function drawFrame() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
  bg.addColorStop(0, '#0f0f1a');
  bg.addColorStop(1, '#12102a');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawStars();
  drawBasket(basketX);
  drawFruits();
  drawSparkles();
}

function gameLoop() {
  if (!running) return;
  frameCount++;

  // Keyboard basket movement
  if (keysDown['ArrowLeft']) basketX = Math.max(BASKET_W / 2, basketX - 8);
  if (keysDown['ArrowRight']) basketX = Math.min(canvas.width - BASKET_W / 2, basketX + 8);

  // Spawn fruits
  while (fruits.length < maxFruits()) spawnFruit();

  const catchY = canvas.height - BASKET_H - 8;
  const toRemove = [];

  fruits.forEach((f, i) => {
    f.y += f.speed;

    // Check catch
    if (f.y + FRUIT_SIZE / 2 >= catchY &&
        f.y - FRUIT_SIZE / 2 <= canvas.height - 8 &&
        f.x >= basketX - BASKET_W / 2 - CATCH_ZONE_EXTRA &&
        f.x <= basketX + BASKET_W / 2 + CATCH_ZONE_EXTRA) {
      toRemove.push(i);
      score += 10;
      caughtCount++;
      addSparkle(f.x, catchY);
      tone(440 + (caughtCount % 8) * 40, 120, 'sine', 0.1);
      tone(660 + (caughtCount % 8) * 40, 80, 'sine', 0.07);
      updateScore();
    } else if (f.y - FRUIT_SIZE / 2 > canvas.height) {
      // Missed
      toRemove.push(i);
      lives--;
      updateLivesDisplay();
      tone(150, 200, 'sawtooth', 0.08);
      if (lives <= 0) {
        endGame();
        return;
      }
    }
  });

  // Remove caught/missed fruits (reverse to preserve indices)
  for (let i = toRemove.length - 1; i >= 0; i--) {
    fruits.splice(toRemove[i], 1);
  }

  drawFrame();
  animId = requestAnimationFrame(gameLoop);
}

function startGame() {
  score = 0; lives = MAX_LIVES; caughtCount = 0; frameCount = 0;
  fruits = []; sparkles = [];
  basketX = canvas.width / 2;
  initStars();
  updateScore();
  updateLivesDisplay();
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('overOverlay').classList.add('hidden');
  running = true;
  if (animId) cancelAnimationFrame(animId);
  gameLoop();
}

function endGame() {
  running = false;
  if (animId) cancelAnimationFrame(animId);
  const isNew = updHS(score);
  document.getElementById('ovScore').textContent = score;
  document.getElementById('ovBest').textContent = getHS();
  document.getElementById('ovCaught').textContent = caughtCount;
  document.getElementById('newRecord').classList.toggle('hidden', !isNew);
  document.getElementById('overOverlay').classList.remove('hidden');
  if (isNew) { tone(523,100,'sine',0.1); tone(659,100,'sine',0.1); tone(784,200,'sine',0.1); }
}

// ── Controls ──────────────────────────────────────────────
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!running) return;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = touch.clientX - rect.left;
  basketX = Math.max(BASKET_W / 2, Math.min(canvas.width - BASKET_W / 2, x));
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  if (!running) return;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = touch.clientX - rect.left;
  basketX = Math.max(BASKET_W / 2, Math.min(canvas.width - BASKET_W / 2, x));
}, { passive: true });

document.addEventListener('keydown', e => {
  keysDown[e.key] = true;
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.preventDefault();
});
document.addEventListener('keyup', e => { keysDown[e.key] = false; });

// ── Init ──────────────────────────────────────────────────
document.getElementById('startBestVal').textContent = getHS();
document.getElementById('bestVal').textContent = getHS();
resizeCanvas();
initStars();
drawFrame();
</script>
</body>
</html>
