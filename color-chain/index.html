<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ໂສ້ສີ — Color Chain</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0f1a;--bg-glass:rgba(255,255,255,0.08);--border-glass:rgba(255,255,255,0.12);--text:#f0f0f5;--text2:#a0a0b8;--accent-grad:linear-gradient(135deg,#7C3AED,#2563EB);--glow:rgba(124,58,237,0.3);--success:#10B981;--font:'Noto Sans Lao','Phetsarath OT',system-ui,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;overscroll-behavior:none;user-select:none;-webkit-user-select:none;display:flex;flex-direction:column}
.bg{position:fixed;inset:0;z-index:-1;pointer-events:none}
.bg::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,0.08)0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(37,99,235,0.06)0%,transparent 50%)}
.overlay{position:fixed;inset:0;z-index:100;background:rgba(15,15,26,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;opacity:1;transition:opacity 0.4s}
.overlay.hidden{opacity:0;pointer-events:none}
.ov-emoji{font-size:3.5rem;margin-bottom:12px;animation:bounceIn 0.5s ease}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.ov-title{font-size:2.2rem;font-weight:800;text-align:center;margin-bottom:6px}
.ov-sub{font-size:0.95rem;color:var(--text2);text-align:center;margin-bottom:24px;max-width:300px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 36px;border:none;border-radius:999px;font-family:var(--font);font-size:1.1rem;font-weight:600;cursor:pointer;transition:all 0.25s;touch-action:manipulation;min-width:200px}
.btn:active{transform:scale(0.96)}
.btn-primary{background:var(--accent-grad);color:white;box-shadow:0 0 20px var(--glow)}
.btn-secondary{background:var(--bg-glass);color:var(--text);border:1px solid var(--border-glass)}
.btn-group{display:flex;flex-direction:column;gap:12px;width:100%;max-width:260px;align-items:center}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:300px;margin-bottom:24px}
.stat-item{text-align:center;padding:14px 8px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:12px}
.stat-value{font-size:1.8rem;font-weight:700}
.stat-value.best{background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:0.7rem;color:var(--text2);margin-top:4px}
.new-record{display:inline-flex;gap:6px;padding:4px 14px;border-radius:999px;font-size:0.8rem;font-weight:600;background:rgba(16,185,129,0.15);color:var(--success);margin-bottom:16px}
.new-record.hidden{display:none}
.game-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;z-index:10}
.back-btn{width:40px;height:40px;border-radius:50%;background:var(--bg-glass);border:1px solid var(--border-glass);color:var(--text);font-size:1.2rem;display:flex;align-items:center;justify-content:center;text-decoration:none}
.game-title{font-size:1rem;font-weight:700}
.scores{display:flex;gap:14px}
.score-box{text-align:center}
.score-lbl{font-size:0.55rem;color:var(--text2)}
.score-val{font-size:1rem;font-weight:700}
.score-val.best{background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sound-btn{position:fixed;top:12px;right:12px;z-index:200;width:40px;height:40px;padding:0;border-radius:50%;font-size:1.1rem;background:var(--bg-glass);color:var(--text);border:1px solid var(--border-glass);cursor:pointer;touch-action:manipulation}
.start-best{margin-top:16px;text-align:center}
.start-best-lbl{font-size:0.7rem;color:var(--text2)}
.start-best-val{font-size:1.3rem;font-weight:700;background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.timer-bar-wrap{width:100%;max-width:340px;height:6px;background:var(--bg-glass);border-radius:999px;margin-bottom:4px;overflow:hidden}
.timer-bar{height:100%;border-radius:999px;background:var(--accent-grad);transition:width 1s linear,background 0.5s}
.timer-bar.urgent{background:linear-gradient(135deg,#EF4444,#F97316)}
#gameArea{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;touch-action:none}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;width:100%;max-width:340px}
.cell{aspect-ratio:1;border-radius:50%;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s,opacity 0.15s;position:relative;touch-action:none}
.cell.chained{transform:scale(1.15);box-shadow:0 0 12px 4px currentColor;z-index:2}
.cell.dimmed{opacity:0.35}
.cell.removing{transform:scale(0);opacity:0;transition:transform 0.2s,opacity 0.2s}
.cell.falling{transition:none}
.chain-score{position:fixed;pointer-events:none;font-size:1.5rem;font-weight:800;color:white;text-shadow:0 2px 8px rgba(0,0,0,0.5);z-index:300;animation:floatUp 0.8s ease forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}
</style>
</head>
<body>
<div class="bg"></div>

<div class="overlay" id="startScr">
  <div class="ov-emoji">🔗</div>
  <div class="ov-title">ໂສ້ສີ</div>
  <div class="ov-sub">ເຊື່ອມໂຍງສີດຽວກັນ ໃຫ້ຫຼາຍທີ່ສຸດ ໃນ 60 ວິນາທີ!</div>
  <div class="start-best"><div class="start-best-lbl">ຄະແນນສູງສຸດ</div><div class="start-best-val" id="startBest">0</div></div>
  <div class="btn-group">
    <button class="btn btn-primary" onclick="startGame()">🎮 ເລີ່ມຫຼິ້ນ</button>
    <a href="../index.html" class="btn btn-secondary" style="text-decoration:none">🏠 ໜ້າຫຼັກ</a>
  </div>
</div>

<div class="overlay hidden" id="overScr">
  <div class="ov-emoji" id="overEmoji">🔗</div>
  <div class="ov-title">ໝົດເວລາ!</div>
  <div class="new-record hidden" id="nrBadge">🏆 ສະຖິຕິໃໝ່!</div>
  <div class="stats-grid">
    <div class="stat-item"><div class="stat-value" id="fScore">0</div><div class="stat-label">ຄະແນນ</div></div>
    <div class="stat-item"><div class="stat-value best" id="fBest">0</div><div class="stat-label">ດີທີ່ສຸດ</div></div>
    <div class="stat-item"><div class="stat-value" id="fChains">0</div><div class="stat-label">ໂສ້</div></div>
    <div class="stat-item"><div class="stat-value" id="fBestChain">0</div><div class="stat-label">ໂສ້ຍາວສຸດ</div></div>
  </div>
  <div class="btn-group">
    <button class="btn btn-primary" onclick="startGame()">🔄 ລອງໃໝ່</button>
    <a href="../index.html" class="btn btn-secondary" style="text-decoration:none">🏠 ກັບໜ້າຫຼັກ</a>
  </div>
</div>

<div id="gameUI" style="display:none;flex-direction:column;height:100vh;height:100dvh">
  <div class="game-header">
    <a href="../index.html" class="back-btn">←</a>
    <div class="game-title">🔗 ໂສ້ສີ</div>
    <div class="scores">
      <div class="score-box"><div class="score-lbl">ຄະແນນ</div><div class="score-val" id="scoreD">0</div></div>
      <div class="score-box"><div class="score-lbl">ດີສຸດ</div><div class="score-val best" id="bestD">0</div></div>
    </div>
  </div>
  <div style="padding:0 16px 4px;display:flex;align-items:center;justify-content:space-between">
    <div style="font-size:0.75rem;color:var(--text2)">⏱ <span id="timerDisp">60</span>s</div>
    <div style="font-size:0.75rem;color:var(--text2)">ໂສ້ປັດຈຸບັນ: <span id="chainLenDisp">0</span></div>
  </div>
  <div style="padding:0 16px 8px">
    <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar" style="width:100%"></div></div>
  </div>
  <div id="gameArea">
    <div class="grid" id="grid"></div>
  </div>
</div>

<button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>

<script>
const GID='color-chain';
const COLORS=['#EF4444','#3B82F6','#22C55E','#F59E0B','#8B5CF6'];
const COLS=5,ROWS=5,TOTAL_TIME=60;

let grid=[],chain=[],score=0,totalChains=0,bestChain=0,timeLeft=TOTAL_TIME,timerInt=null,running=false,dragging=false;
let aC=null,snd=true;

function sv(k,v){try{localStorage.setItem(`game_${GID}_${k}`,JSON.stringify(v))}catch(e){}}
function ld(k,d=null){try{const r=localStorage.getItem(`game_${GID}_${k}`);return r!==null?JSON.parse(r):d}catch(e){return d}}
function getHS(){return ld('hs',0)}
function updHS(s){const b=getHS();if(s>b){sv('hs',s);return true}return false}
function initA(){if(!aC)aC=new(window.AudioContext||window.webkitAudioContext)();if(aC.state==='suspended')aC.resume()}
function tone(f,d,t='sine',v=0.12){if(!snd||!aC)return;try{const o=aC.createOscillator(),g=aC.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,aC.currentTime+d/1000);o.connect(g);g.connect(aC.destination);o.start();o.stop(aC.currentTime+d/1000)}catch(e){}}
function toggleSound(){snd=!snd;document.getElementById('soundBtn').textContent=snd?'🔊':'🔇'}
(function(){function u(){initA();document.removeEventListener('touchstart',u,true)}document.addEventListener('touchstart',u,true)})();

function randColor(){return COLORS[Math.floor(Math.random()*COLORS.length)]}

function buildGrid(){
  grid=[];
  for(let r=0;r<ROWS;r++){grid.push([]);for(let c=0;c<COLS;c++)grid[r].push(randColor())}
}

function renderGrid(){
  const el=document.getElementById('grid');
  el.innerHTML='';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const d=document.createElement('div');
      d.className='cell';
      d.dataset.r=r;d.dataset.c=c;
      d.style.background=grid[r][c];
      d.style.boxShadow=`0 2px 8px ${grid[r][c]}66`;
      d.style.color=grid[r][c];
      el.appendChild(d);
    }
  }
}

function cellEl(r,c){return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`)}

function inChain(r,c){return chain.some(x=>x[0]===r&&x[1]===c)}

function isAdjacent(r,c){
  if(!chain.length)return false;
  const [lr,lc]=chain[chain.length-1];
  return Math.abs(r-lr)+Math.abs(c-lc)===1;
}

function addToChain(r,c){
  if(!running)return;
  // If already second-to-last, allow backtracking
  if(chain.length>=2){
    const [pr,pc]=chain[chain.length-2];
    if(pr===r&&pc===c){chain.pop();updateChainUI();return}
  }
  if(inChain(r,c))return;
  if(chain.length>0&&!isAdjacent(r,c))return;
  if(chain.length>0&&grid[r][c]!==grid[chain[0][0]][chain[0][1]])return;
  chain.push([r,c]);
  updateChainUI();
  tone(300+chain.length*40,60);
}

function updateChainUI(){
  const chainColor=chain.length>0?grid[chain[0][0]][chain[0][1]]:null;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const el=cellEl(r,c);
      if(!el)continue;
      if(inChain(r,c)){el.classList.add('chained');el.classList.remove('dimmed')}
      else if(chainColor&&grid[r][c]!==chainColor){el.classList.remove('chained');el.classList.add('dimmed')}
      else{el.classList.remove('chained','dimmed')}
    }
  }
  document.getElementById('chainLenDisp').textContent=chain.length;
}

function confirmChain(){
  if(!running||chain.length<2){cancelChain();return}
  const len=chain.length;
  const pts=len*len*10;
  score+=pts;
  totalChains++;
  if(len>bestChain)bestChain=len;
  document.getElementById('scoreD').textContent=score;
  // Show floating score
  const [fr,fc]=chain[Math.floor(chain.length/2)];
  const el=cellEl(fr,fc);
  if(el){
    const rect=el.getBoundingClientRect();
    const f=document.createElement('div');
    f.className='chain-score';
    f.textContent='+'+pts;
    f.style.left=rect.left+'px';
    f.style.top=rect.top+'px';
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),800);
  }
  // Remove chained cells
  chain.forEach(([r,c])=>{
    const el=cellEl(r,c);
    if(el)el.classList.add('removing');
  });
  tone(440+len*30,200,'sine',0.15);
  if(navigator.vibrate)navigator.vibrate(30);
  setTimeout(()=>{
    chain.forEach(([r,c])=>{grid[r][c]=null});
    applyGravity();
    chain=[];
  },220);
}

function applyGravity(){
  for(let c=0;c<COLS;c++){
    let empty=[];
    for(let r=ROWS-1;r>=0;r--){
      if(grid[r][c]===null)empty.push(r);
      else if(empty.length){
        const er=empty.shift();
        grid[er][c]=grid[r][c];
        grid[r][c]=null;
        empty.push(r);
      }
    }
    // Fill nulls from top
    for(let r=0;r<ROWS;r++){
      if(grid[r][c]===null)grid[r][c]=randColor();
    }
  }
  renderGrid();
  attachEvents();
}

function cancelChain(){
  chain=[];
  updateChainUI();
  document.getElementById('chainLenDisp').textContent=0;
}

function attachEvents(){
  const cells=document.querySelectorAll('.cell');
  cells.forEach(el=>{
    el.addEventListener('mousedown',e=>{
      if(!running)return;
      dragging=true;chain=[];
      const r=+el.dataset.r,c=+el.dataset.c;
      addToChain(r,c);
    });
    el.addEventListener('mouseenter',e=>{
      if(!running||!dragging)return;
      addToChain(+el.dataset.r,+el.dataset.c);
    });
  });
  document.getElementById('grid').addEventListener('touchstart',e=>{
    if(!running)return;
    e.preventDefault();
    dragging=true;chain=[];
    const t=e.touches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    if(el&&el.classList.contains('cell'))addToChain(+el.dataset.r,+el.dataset.c);
  },{passive:false});
  document.getElementById('grid').addEventListener('touchmove',e=>{
    if(!running||!dragging)return;
    e.preventDefault();
    const t=e.touches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    if(el&&el.classList.contains('cell'))addToChain(+el.dataset.r,+el.dataset.c);
  },{passive:false});
}

document.addEventListener('mouseup',()=>{if(dragging){dragging=false;confirmChain()}});
document.addEventListener('touchend',()=>{if(dragging){dragging=false;confirmChain()}});

function startTimer(){
  timeLeft=TOTAL_TIME;
  if(timerInt)clearInterval(timerInt);
  timerInt=setInterval(()=>{
    timeLeft--;
    document.getElementById('timerDisp').textContent=timeLeft;
    const pct=(timeLeft/TOTAL_TIME)*100;
    const bar=document.getElementById('timerBar');
    bar.style.width=pct+'%';
    if(timeLeft<=10)bar.classList.add('urgent');
    if(timeLeft<=0){clearInterval(timerInt);gameOver()}
  },1000);
}

function gameOver(){
  running=false;
  const isNew=updHS(score);
  document.getElementById('fScore').textContent=score;
  document.getElementById('fBest').textContent=Math.max(score,getHS());
  document.getElementById('fChains').textContent=totalChains;
  document.getElementById('fBestChain').textContent=bestChain;
  document.getElementById('nrBadge').classList.toggle('hidden',!isNew);
  document.getElementById('overEmoji').textContent=score>=500?'🏆':score>=200?'🔗':'😢';
  document.getElementById('overScr').classList.remove('hidden');
  tone(220,400,'sawtooth',0.1);
}

function startGame(){
  initA();
  score=0;totalChains=0;bestChain=0;chain=[];dragging=false;running=true;
  document.getElementById('startScr').classList.add('hidden');
  document.getElementById('overScr').classList.add('hidden');
  const ui=document.getElementById('gameUI');
  ui.style.display='flex';
  document.getElementById('scoreD').textContent='0';
  document.getElementById('bestD').textContent=getHS();
  document.getElementById('chainLenDisp').textContent='0';
  document.getElementById('timerBar').classList.remove('urgent');
  buildGrid();
  renderGrid();
  attachEvents();
  startTimer();
}

document.getElementById('startBest').textContent=getHS();
</script>
</body>
</html>
