<!DOCTYPE html>
<html lang="lo"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>ລ້ຽງສັດ — Pet Collect</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0f0f1a;--bg-glass:rgba(255,255,255,0.08);--border-glass:rgba(255,255,255,0.12);--text:#f0f0f5;--text2:#a0a0b8;--accent:#7C3AED;--accent-grad:linear-gradient(135deg,#7C3AED,#2563EB);--glow:rgba(124,58,237,0.3);--success:#10b981;--font:'Noto Sans Lao','Phetsarath OT',system-ui,sans-serif}body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;overscroll-behavior:none;user-select:none;-webkit-user-select:none;display:flex;flex-direction:column}
.bg-dec{position:fixed;inset:0;z-index:-1;pointer-events:none}.bg-dec::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,0.08)0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(37,99,235,0.06)0%,transparent 50%)}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;z-index:10}@supports(padding:env(safe-area-inset-top)){.header{padding-top:calc(12px + env(safe-area-inset-top))}}.title{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}.back{width:44px;height:44px;border-radius:50%;border:1px solid var(--border-glass);background:var(--bg-glass);color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none}
.coins-display{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:6px}
.area{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px;gap:12px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.egg-zone{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;background:var(--bg-glass);border:2px solid var(--border-glass);border-radius:20px;width:100%;max-width:300px;cursor:pointer;touch-action:manipulation}
.egg{font-size:5rem;transition:transform 0.1s}.egg.shake{animation:eggShake 0.1s ease}
@keyframes eggShake{0%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}100%{transform:rotate(0)}}
.egg-bar{width:80%;height:8px;border-radius:4px;background:rgba(255,255,255,0.1);overflow:hidden}.egg-fill{height:100%;border-radius:4px;background:var(--accent-grad);transition:width 0.1s}
.egg-label{font-size:0.8rem;color:var(--text2)}
.hatch-result{font-size:3rem;animation:bounceIn 0.5s}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.section-title{font-size:0.8rem;color:var(--text2);font-weight:600;text-align:center;margin-top:4px}
.collection{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:100%;max-width:300px}
.pet-card{display:flex;flex-direction:column;align-items:center;padding:8px;border-radius:12px;background:var(--bg-glass);border:1px solid var(--border-glass)}
.pet-emoji{font-size:1.8rem}.pet-count{font-size:0.55rem;color:var(--text2);margin-top:2px}
.pet-card.locked{opacity:0.15}.pet-card.legendary{border-color:gold;box-shadow:0 0 8px rgba(255,215,0,0.2)}
.shop-btn{padding:12px 24px;border-radius:999px;border:none;background:var(--accent-grad);color:white;font-family:var(--font);font-size:1rem;font-weight:700;cursor:pointer;touch-action:manipulation;box-shadow:0 0 15px var(--glow);width:100%;max-width:300px}.shop-btn:active{transform:scale(0.96)}.shop-btn:disabled{opacity:0.3}
.overlay{position:fixed;inset:0;background:rgba(15,15,26,0.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;z-index:200;opacity:1;transition:opacity 0.4s}.overlay.hidden{opacity:0;pointer-events:none}
.ov-emoji{font-size:4rem;margin-bottom:16px;animation:bounceIn 0.5s}.ov-title{font-size:2.2rem;font-weight:800;margin-bottom:8px;text-align:center}.ov-sub{font-size:1rem;color:var(--text2);margin-bottom:24px;text-align:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 40px;border:none;border-radius:999px;font-family:var(--font);font-size:1.15rem;font-weight:600;cursor:pointer;transition:all 0.25s;touch-action:manipulation;min-width:220px}.btn:active{transform:scale(0.96)}.btn-primary{background:var(--accent-grad);color:white;box-shadow:0 0 20px var(--glow)}.btn-secondary{background:var(--bg-glass);color:var(--text);border:1px solid var(--border-glass)}.btn-group{display:flex;flex-direction:column;gap:12px;width:100%;max-width:260px}
.sound-btn{position:fixed;top:12px;right:12px;width:44px;height:44px;border-radius:50%;border:1px solid var(--border-glass);background:var(--bg-glass);color:var(--text);font-size:1.2rem;cursor:pointer;z-index:300;display:flex;align-items:center;justify-content:center}
</style></head><body><div class="bg-dec"></div>
<div class="overlay" id="startScr"><div class="ov-emoji">🐾</div><div class="ov-title">ລ້ຽງສັດ</div><div class="ov-sub">ແຕະໄຂ່ — ເກັບສັດລ້ຽງ!</div>
<div class="btn-group"><button class="btn btn-primary" onclick="init()">🐾 ເລີ່ມ</button><a href="../index.html" class="btn btn-secondary" style="text-decoration:none">🏠 ກັບໜ້າຫຼັກ</a></div></div>
<div class="header" id="hdr" style="display:none"><a href="../index.html" class="back">←</a><div class="title"><span>🐾</span><span>ລ້ຽງສັດ</span></div><div class="coins-display">🪙 <span id="coinVal">0</span></div></div>
<div class="area" id="ga" style="display:none">
  <div class="egg-zone" id="eggZone" onclick="tapEgg()"><div class="egg" id="egg">🥚</div><div class="egg-bar"><div class="egg-fill" id="eggFill" style="width:0%"></div></div><div class="egg-label" id="eggLabel">ແຕະ 20 ຄັ້ງ!</div></div>
  <button class="shop-btn" id="buyBtn" onclick="buyEgg()" disabled>🥚 ຊື້ໄຂ່ — 🪙50</button>
  <div class="section-title">📦 ສັດລ້ຽງ (<span id="colCount">0</span>/20)</div>
  <div class="collection" id="collection"></div>
</div>
<button class="sound-btn" id="snd" onclick="sndOn=!sndOn;this.textContent=sndOn?'🔊':'🔇'">🔊</button>
<script>
const GID='pet-collect';
const ALL_PETS=[
  {emoji:'🐶',name:'ໝາ',rarity:'common',rate:20},{emoji:'🐱',name:'ແມວ',rarity:'common',rate:20},
  {emoji:'🐰',name:'ກະຕ່າຍ',rarity:'common',rate:15},{emoji:'🐹',name:'ແຮມສະເຕີ',rarity:'common',rate:15},
  {emoji:'🐸',name:'ກົບ',rarity:'common',rate:10},{emoji:'🐢',name:'ເຕົ່າ',rarity:'uncommon',rate:8},
  {emoji:'🦊',name:'ສຸນັກຈິ້ງຈອກ',rarity:'uncommon',rate:8},{emoji:'🐼',name:'ແພນດ້າ',rarity:'uncommon',rate:6},
  {emoji:'🦁',name:'ສິງ',rarity:'rare',rate:5},{emoji:'🐯',name:'ເສືອ',rarity:'rare',rate:4},
  {emoji:'🦄',name:'ຢູນິຄອນ',rarity:'rare',rate:3},{emoji:'🐲',name:'ມັງກອນ',rarity:'epic',rate:2},
  {emoji:'🦋',name:'ຜີເສື້ອ',rarity:'uncommon',rate:7},{emoji:'🐠',name:'ປາ',rarity:'common',rate:12},
  {emoji:'🦜',name:'ນົກແກ້ວ',rarity:'uncommon',rate:6},{emoji:'🐙',name:'ປາໝຶກ',rarity:'rare',rate:4},
  {emoji:'🦚',name:'ນົກຍູງ',rarity:'rare',rate:3},{emoji:'🐉',name:'ມັງກອນທອງ',rarity:'legendary',rate:1},
  {emoji:'🦩',name:'ຟລາມິງໂກ',rarity:'epic',rate:2},{emoji:'🦈',name:'ສະຫຼາມ',rarity:'legendary',rate:1},
];
const RARITY_COLORS={common:'#9CA3AF',uncommon:'#22C55E',rare:'#3B82F6',epic:'#A855F7',legendary:'#F59E0B'};
let coins=0,collection={},taps=0,tapsNeeded=20,hasEgg=true,sndOn=true,ac=null;
function save(k,v){try{localStorage.setItem(`game_${GID}_${k}`,JSON.stringify(v))}catch(e){}}
function load(k,d=null){try{const r=localStorage.getItem(`game_${GID}_${k}`);return r!==null?JSON.parse(r):d}catch(e){return d}}
function initAudio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume()}
function playTone(f,d,t='sine',v=0.2){if(!sndOn||!ac)return;if(ac.state==='suspended'){ac.resume().then(()=>playTone(f,d,t,v));return;}try{const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d/1000);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d/1000)}catch(e){}}
(function(){function u(){initAudio();document.removeEventListener('touchstart',u,true);document.removeEventListener('touchend',u,true);document.removeEventListener('click',u,true)}document.addEventListener('touchstart',u,true);document.addEventListener('touchend',u,true);document.addEventListener('click',u,true)})();

function weightedPet(){
  const total=ALL_PETS.reduce((a,p)=>a+p.rate,0);let r=Math.random()*total;
  for(const p of ALL_PETS){r-=p.rate;if(r<=0)return p}return ALL_PETS[0]
}
function tapEgg(){
  if(!hasEgg)return;taps++;
  const egg=document.getElementById('egg');egg.classList.remove('shake');void egg.offsetWidth;egg.classList.add('shake');
  playTone(400+taps*10,30,'sine',0.1);if(navigator.vibrate)navigator.vibrate(10);
  document.getElementById('eggFill').style.width=(taps/tapsNeeded*100)+'%';
  document.getElementById('eggLabel').textContent=`${tapsNeeded-taps} ຄັ້ງອີກ!`;
  if(taps>=tapsNeeded)hatch()
}
function hatch(){
  const pet=weightedPet();collection[pet.emoji]=(collection[pet.emoji]||0)+1;coins+=5;
  hasEgg=false;taps=0;
  document.getElementById('egg').textContent=pet.emoji;document.getElementById('egg').className='hatch-result';
  document.getElementById('eggLabel').innerHTML=`<span style="color:${RARITY_COLORS[pet.rarity]};font-weight:700">${pet.name}</span> (${pet.rarity})`;
  document.getElementById('eggFill').style.width='100%';
  playTone(523,100,'sine',0.3);setTimeout(()=>playTone(659,100,'sine',0.3),100);setTimeout(()=>playTone(784,200,'sine',0.3),200);
  if(navigator.vibrate)navigator.vibrate([30,40,30]);
  save('coins',coins);save('collection',collection);render()
}
function buyEgg(){
  if(coins<50)return;coins-=50;hasEgg=true;taps=0;
  document.getElementById('egg').textContent='🥚';document.getElementById('egg').className='egg';
  document.getElementById('eggFill').style.width='0%';document.getElementById('eggLabel').textContent=`ແຕະ ${tapsNeeded} ຄັ້ງ!`;
  playTone(400,50,'sine',0.15);save('coins',coins);render()
}
function render(){
  document.getElementById('coinVal').textContent=coins;
  document.getElementById('buyBtn').disabled=coins<50||hasEgg;
  const c=document.getElementById('collection');c.innerHTML='';
  const owned=Object.keys(collection).length;document.getElementById('colCount').textContent=owned;
  ALL_PETS.forEach(p=>{
    const d=document.createElement('div');
    const owns=collection[p.emoji]||0;
    d.className='pet-card'+(owns?'':' locked')+(p.rarity==='legendary'?' legendary':'');
    d.innerHTML=`<div class="pet-emoji">${p.emoji}</div><div class="pet-count" style="color:${RARITY_COLORS[p.rarity]}">${owns?'×'+owns:'?'}</div>`;
    c.appendChild(d)
  })
}
function init(){
  document.getElementById('startScr').classList.add('hidden');document.getElementById('hdr').style.display='flex';document.getElementById('ga').style.display='flex';
  coins=load('coins',0);collection=load('collection',{})||{};hasEgg=true;taps=0;render()
}
</script></body></html>
